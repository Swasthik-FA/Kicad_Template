<!doctype html>
<!--
  Standalone full-page 3D viewer.
  Substituted at CI publish time:
    {{TITLE}}      - shown in the title bar and page <title>
    {{GLB_URL}}    - URL to the GLB (relative path from this file)
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{TITLE}} — 3D Viewer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0A0E1A;
    color: #E6E9F2;
    overflow: hidden;
    background-image:
      radial-gradient(820px 620px at 8% -12%, rgba(99,102,241,0.42), transparent 60%),
      radial-gradient(680px 520px at 96% -4%, rgba(14,165,233,0.32), transparent 65%),
      radial-gradient(720px 580px at 88% 105%, rgba(236,72,153,0.28), transparent 62%),
      radial-gradient(760px 600px at 4% 110%, rgba(168,85,247,0.34), transparent 60%);
  }
  model-viewer {
    width: 100vw; height: 100vh; display: block;
    background: transparent;
    --poster-color: transparent;
  }
  .topbar {
    position: fixed; top: 16px; left: 16px; right: 16px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; pointer-events: none; z-index: 10;
  }
  .title {
    pointer-events: auto;
    background: rgba(22,28,45,0.55);
    backdrop-filter: blur(22px) saturate(180%);
    -webkit-backdrop-filter: blur(22px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 14px; padding: 12px 18px;
    font-size: 14px; font-weight: 600; line-height: 1.3;
    box-shadow: 0 8px 24px rgba(0,0,0,.30);
    max-width: calc(100% - 200px);
  }
  .title .sub {
    display: block; font-size: 11px; font-weight: 500;
    color: #94A0B8; letter-spacing: .06em; text-transform: uppercase;
    margin-top: 2px;
  }
  .actions { display: flex; gap: 8px; pointer-events: auto; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 14px;
    background: rgba(22,28,45,0.55);
    backdrop-filter: blur(22px) saturate(180%);
    -webkit-backdrop-filter: blur(22px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 10px; color: #E6E9F2;
    text-decoration: none; font-size: 13px; font-weight: 500;
    transition: background .15s, border-color .15s, transform .15s;
    cursor: pointer;
  }
  .btn:hover { background: rgba(30,38,60,0.65); border-color: #6366F1; }
  .btn:active { transform: scale(.97); }
  .btn svg { width: 16px; height: 16px; }
  .help {
    position: fixed; bottom: 16px; left: 50%;
    transform: translateX(-50%);
    background: rgba(22,28,45,0.55);
    backdrop-filter: blur(22px) saturate(180%);
    -webkit-backdrop-filter: blur(22px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 999px; padding: 8px 16px;
    font-size: 12px; color: #94A0B8; pointer-events: none;
    box-shadow: 0 8px 24px rgba(0,0,0,.30);
    z-index: 10;
  }
  .help kbd {
    background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 4px;
    font-family: ui-monospace, Menlo, monospace; font-size: 11px;
    color: #E6E9F2; margin: 0 2px;
  }
  .loader, .err {
    position: fixed; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; color: #94A0B8; pointer-events: none;
    transition: opacity .3s ease;
  }
  .err { display: none; color: #F87171; padding: 24px; text-align: center; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(255,255,255,0.10);
    border-top-color: #818CF8;
    border-radius: 50%;
    animation: spin .9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 600px) {
    .title { max-width: calc(100% - 130px); padding: 10px 14px; font-size: 13px; }
    .help { display: none; }
  }
</style>
</head>
<body>
  <div class="topbar">
    <div class="title">
      {{TITLE}}
      <span class="sub">3D Viewer</span>
    </div>
    <div class="actions">
      <a class="btn" href="HTML/{{TITLE}}-navigate.html"
         title="Back to project navigation">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m15 18-6-6 6-6"/>
        </svg>
        Back
      </a>
    </div>
  </div>

  <div class="help">
    <kbd>drag</kbd> rotate · <kbd>scroll</kbd> zoom · <kbd>right-drag</kbd> pan
  </div>

  <div class="loader" id="loader">
    <div class="spinner"></div>
    <div>Loading 3D model…</div>
  </div>

  <div class="err" id="err"></div>

  <model-viewer
    id="viewer"
    src="{{GLB_URL}}"
    alt="Interactive 3D PCB model"
    camera-controls
    touch-action="pan-y"
    shadow-intensity="1"
    exposure="1.1"
    environment-image="neutral"
    interaction-prompt="auto"
    auto-rotate-delay="3000">
  </model-viewer>

  <script type="module"
          src="https://cdn.jsdelivr.net/npm/@google/model-viewer@4.0.0/dist/model-viewer.min.js"></script>

  <script>
    var loader = document.getElementById('loader');
    var err = document.getElementById('err');
    var viewer = document.getElementById('viewer');
    viewer.addEventListener('load', function () {
      loader.style.opacity = '0';
      setTimeout(function () { loader.style.display = 'none'; }, 350);
    });
    viewer.addEventListener('error', function (e) {
      loader.style.display = 'none';
      err.style.display = 'flex';
      err.textContent =
        'Failed to load the 3D model. If you opened this page from disk, ' +
        'the <model-viewer> ES module is blocked. Open it on GitHub Pages ' +
        'or via a local web server (python -m http.server).';
    });
    // Nudge a fail-message after 25 s if the load event hasn't fired yet
    setTimeout(function () {
      if (loader.style.display !== 'none') {
        err.style.display = 'flex';
        err.textContent =
          'The 3D viewer is taking too long. Most likely the page is opened ' +
          'from disk (file://) which blocks ES module loading. Open it on ' +
          'GitHub Pages or via "python -m http.server".';
      }
    }, 25000);
  </script>
</body>
</html>
