<!doctype html>
<!--
  Standalone full-page 3D viewer.
  Substituted at CI publish time:
    {{TITLE}}      - shown in the page <title>
    {{GLB_URL}}    - URL to the GLB (relative path from this file)
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{TITLE}} — Interactive 3D Model</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #EEF2F6;
    color: #1F2937;
    overflow: hidden;
    background-image:
      radial-gradient(1200px 800px at 50% -10%, #FFFFFF 0%, #EEF2F6 55%, #DDE3EC 100%);
  }

  /* "Interactive 3D Model" heading — accent bar + gradient text fill,
     mirrors the .output-comment style from the navigate page so the
     two pages feel continuous. */
  .heading {
    position: fixed; top: 22px; left: 28px;
    z-index: 10; pointer-events: none;
    font-size: 1.05rem;
    font-weight: 800;
    letter-spacing: -0.01em;
    padding-left: 18px;
    line-height: 1.2;
    color: #0F172A;
  }
  .heading::before {
    content: "";
    position: absolute;
    left: 0; top: 50%;
    transform: translateY(-50%);
    width: 4px; height: 22px;
    border-radius: 999px;
    background: linear-gradient(180deg, #2563EB, #1D4ED8);
  }

  model-viewer {
    width: 100vw; height: 100vh; display: block;
    background: transparent;
    --poster-color: transparent;
  }

  .loader, .err {
    position: fixed; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; color: #475569; pointer-events: none;
    transition: opacity .3s ease;
  }
  .err { display: none; color: #B91C1C; padding: 24px; text-align: center; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(15,23,42,0.10);
    border-top-color: #2563EB;
    border-radius: 50%;
    animation: spin .9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="heading">Interactive 3D Model</div>

  <div class="loader" id="loader">
    <div class="spinner"></div>
    <div>Loading 3D model…</div>
  </div>

  <div class="err" id="err"></div>

  <model-viewer
    id="viewer"
    src="{{GLB_URL}}"
    alt="Interactive 3D PCB model"
    camera-controls
    touch-action="pan-y"
    shadow-intensity="0.9"
    shadow-softness="1"
    exposure="1.15"
    tone-mapping="commerce"
    environment-image="neutral"
    interaction-prompt="none"
    min-camera-orbit="auto auto 50%"
    max-camera-orbit="auto auto 400%"
    camera-orbit="35deg 65deg 130%"
    field-of-view="22deg"
    reveal="auto">
  </model-viewer>

  <script type="module"
          src="https://cdn.jsdelivr.net/npm/@google/model-viewer@4.0.0/dist/model-viewer.min.js"></script>

  <script>
    var loader = document.getElementById('loader');
    var err = document.getElementById('err');
    var viewer = document.getElementById('viewer');
    viewer.addEventListener('load', function () {
      loader.style.opacity = '0';
      setTimeout(function () { loader.style.display = 'none'; }, 350);
    });
    viewer.addEventListener('error', function () {
      loader.style.display = 'none';
      err.style.display = 'flex';
      err.textContent =
        'Failed to load the 3D model. If you opened this page from disk, ' +
        'the <model-viewer> ES module is blocked. Open it on GitHub Pages ' +
        'or via a local web server (python -m http.server).';
    });
    setTimeout(function () {
      if (loader.style.display !== 'none') {
        err.style.display = 'flex';
        err.textContent =
          'The 3D viewer is taking too long. Most likely the page is opened ' +
          'from disk (file://) which blocks ES module loading. Open it on ' +
          'GitHub Pages or via "python -m http.server".';
      }
    }, 25000);
  </script>
</body>
</html>
