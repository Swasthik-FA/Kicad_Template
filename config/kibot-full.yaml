# ============================================================================
# KiBot config — FULL-CHECK PRESET
# ----------------------------------------------------------------------------
# Used by:  pr-to-dev.yml, pr-to-qa.yml, pr-to-main.yml, release.yml
# Purpose:  The "real" build. Runs ERC + DRC as preflight (a failure aborts
#           the build before any output is generated, EXCEPT the JSON ERC/DRC
#           reports which are still produced for our error-report generator)
#           then produces the full JLCPCB-ready manufacturing package.
#
# Key behaviour:
#   - ERC/DRC are run in JSON-report mode FIRST (via the `erc` / `drc`
#     output types) so we always have parseable artifacts for the error
#     report HTML. These outputs do not abort on errors — they just record.
#   - The `preflight` block then runs ERC/DRC again in "fail-the-build" mode.
#     If they fail, KiBot exits non-zero and the workflow's failure handler
#     picks up the JSON files written above.
#
# Outputs are written under the directory passed via `kibot -d <dir>`.
# ============================================================================
kibot:
  version: 1

global:
  output: '%f-%i.%x'
  date_time_format: '%Y-%m-%d_%H-%M'
  # Keep PCB filename consistent across outputs (no commit hash suffix).
  variant: ''

# ----------------------------------------------------------------------------
# Filters: which ERC/DRC violations should be downgraded.
# Footprint/symbol-library "not configured" warnings are common in CI because
# the runner doesn't have the user's local libs configured. We still surface
# them but they won't block the build.
# ----------------------------------------------------------------------------
filters:
  - name: ci_library_warnings
    comment: "Demote unresolved-library warnings — runner lacks local libs"
    type: generic
    change_to: ignore
    error: 'lib_symbol_issues'
  - name: ci_footprint_link_warnings
    comment: "Demote footprint link warnings"
    type: generic
    change_to: ignore
    error: 'footprint_link_issues'

# ----------------------------------------------------------------------------
# Preflight: run ERC + DRC, fail the build on errors (warnings are allowed).
# ----------------------------------------------------------------------------
preflight:
  run_erc: true
  run_drc: true
  erc_warnings: false           # warnings don't fail the build
  drc_warnings: false
  check_zone_fills: true
  filters:
    - filter: 'CI library noise'
      error: 'lib_symbol_issues'
    - filter: 'CI footprint link noise'
      error: 'footprint_link_issues'

# ----------------------------------------------------------------------------
# Outputs
# ----------------------------------------------------------------------------
outputs:

  # ==========================================================================
  # ERC / DRC reports in JSON  (consumed by config/generate_error_report.py)
  # ==========================================================================
  - name: erc_json
    comment: "ERC results — JSON for the error-report generator"
    type: erc
    dir: reports
    options:
      format: JSON
      output: 'erc.json'
      warnings_as_errors: false

  - name: drc_json
    comment: "DRC results — JSON for the error-report generator"
    type: drc
    dir: reports
    options:
      format: JSON
      output: 'drc.json'
      warnings_as_errors: false
      schematic_parity: true

  # ==========================================================================
  # Visual exports (also produced on PRs — reviewers want to see the board)
  # ==========================================================================
  - name: schematic_pdf
    comment: "Schematic — PDF (single doc, all sheets)"
    type: pdf_sch_print
    dir: visual/schematic
    options:
      output: '%f-schematic.pdf'

  - name: schematic_svg
    comment: "Schematic — SVG (one per sheet)"
    type: svg_sch_print
    dir: visual/schematic
    options:
      output: '%f-schematic.svg'

  - name: pcb_top_png
    comment: "PCB top — PNG render"
    type: pcbdraw
    dir: visual/pcb
    options:
      format: png
      dpi: 600
      output: '%f-pcb-top.png'
      bottom: false

  - name: pcb_bottom_png
    comment: "PCB bottom — PNG render"
    type: pcbdraw
    dir: visual/pcb
    options:
      format: png
      dpi: 600
      output: '%f-pcb-bottom.png'
      bottom: true

  - name: pcb_pdf
    comment: "PCB layers — PDF (front + back, all useful layers)"
    type: pcb_print
    dir: visual/pcb
    options:
      format: PDF
      output: '%f-pcb.pdf'
      pages:
        - layers:
            - F.Cu
            - F.Silkscreen
            - F.Mask
            - F.Paste
            - Edge.Cuts
          sheet: 'Top'
        - layers:
            - B.Cu
            - B.Silkscreen
            - B.Mask
            - B.Paste
            - Edge.Cuts
          sheet: 'Bottom'
          mirror: true

  # ==========================================================================
  # 3D render (PNG) and STEP export (mechanical CAD interchange)
  # ==========================================================================
  - name: pcb_3d_render
    comment: "Board — 3D render PNG (Raytracing)"
    type: render_3d
    dir: visual/3d
    options:
      ray_tracing: true
      width: 1920
      height: 1440
      output: '%f-3d-top.png'

  - name: pcb_step
    comment: "Board — STEP file (mechanical CAD interchange)"
    type: step
    dir: visual/3d
    options:
      output: '%f.step'

  # ==========================================================================
  # Interactive HTML BOM (Stand-alone HTML, click components on the board)
  # ==========================================================================
  - name: ibom
    comment: "Interactive HTML BOM"
    type: ibom
    dir: bom
    options:
      output: '%f-ibom.html'
      dark_mode: true
      show_fabrication: true
      extra_fields: 'LCSC,MPN,Manufacturer'

  # ==========================================================================
  # CSV BOM — JLCPCB-friendly column layout
  # ==========================================================================
  - name: bom_csv
    comment: "BOM CSV (Reference, Value, Footprint, Quantity, LCSC)"
    type: bom
    dir: bom
    options:
      output: '%f-bom.csv'
      format: CSV
      group_fields: ['Value', 'Footprint', 'LCSC']
      columns:
        - field: References
          name: Reference
        - field: Value
          name: Value
        - field: Footprint
          name: Footprint
        - field: Quantity Per PCB
          name: Quantity
        - field: LCSC
          name: 'LCSC Part #'
        - field: MPN
          name: MPN
        - field: Manufacturer
          name: Manufacturer
      csv:
        separator: ','
        hide_pcb_info: true
        hide_stats_info: true

  # ==========================================================================
  # Manufacturing — gerbers, drills, pick-and-place
  # ==========================================================================
  - name: gerbers
    comment: "Gerbers — JLCPCB-compatible defaults"
    type: gerber
    dir: manufacturing/gerbers
    options:
      exclude_edge_layer: true
      exclude_pads_from_silkscreen: true
      use_aux_axis_as_origin: false
      plot_sheet_reference: false
      plot_footprint_refs: true
      plot_footprint_values: false
      force_plot_invisible_refs_vals: false
      tent_vias: true
      use_protel_extensions: true
      create_gerber_job_file: true
      line_width: 0.1
      subtract_mask_from_silk: true
      use_gerber_x2_attributes: false
      use_gerber_net_attributes: false
      gerber_precision: 4.6
      output: '%f-%i.%x'
    layers:
      - copper
      - F.Silkscreen
      - B.Silkscreen
      - F.Mask
      - B.Mask
      - F.Paste
      - B.Paste
      - Edge.Cuts

  - name: drill
    comment: "Drill files — Excellon, JLCPCB layout"
    type: excellon
    dir: manufacturing/gerbers
    options:
      metric_units: true
      pth_and_npth_single_file: false
      use_aux_axis_as_origin: false
      map:
        type: gerber
      output: '%f-%i.%x'

  - name: position
    comment: "Pick-and-place / centroid (CSV, JLCPCB-style)"
    type: position
    dir: manufacturing/assembly
    options:
      format: CSV
      units: millimeters
      separate_files_for_front_and_back: false
      only_smd: true
      output: '%f-pick-place.csv'
      columns:
        - id: Ref
          name: Designator
        - id: Val
          name: Value
        - id: Package
          name: Package
        - id: PosX
          name: 'Mid X'
        - id: PosY
          name: 'Mid Y'
        - id: Rot
          name: Rotation
        - id: Side
          name: Layer

  # ==========================================================================
  # Convenience zip — only used at release time (the workflow re-zips itself
  # into the final manufacturing package, but this gives KiBot one too).
  # ==========================================================================
  - name: manufacturing_zip
    comment: "All manufacturing files in one ZIP"
    type: compress
    dir: manufacturing
    options:
      output: '%f-manufacturing.zip'
      format: ZIP
      files:
        - from_output: gerbers
          dest: gerbers
        - from_output: drill
          dest: gerbers
        - from_output: position
          dest: assembly
        - from_output: bom_csv
          dest: bom
        - from_output: ibom
          dest: bom
