# ============================================================================
# Output: 3D viewer PCB render in PNG format
# ----------------------------------------------------------------------------
# Templated. Imported multiple times from kibot_main.yaml with different
# NAME / VIEW / ROTATE_* / SUFFIX values to produce top, bottom, and angled
# isometric views. Mirrors reference's kibot_out_png_3d_viewer.yaml exactly.
# ============================================================================
kibot:
  version: 1

outputs:
  - name: '@NAME@'
    comment: '@COMMENT@'
    type: render_3d
    dir: '@DIR@'
    category: '@DIR@'
    options:
      output: '%f-@SUFFIX@%I%v.%x'
      auto_crop: true
      enable_crop_workaround: true
      rotate_x: '@ROTATE_X@'
      rotate_y: '@ROTATE_Y@'
      rotate_z: '@ROTATE_Z@'
      zoom: '@ZOOM@'
      width: '@WIDTH@'
      height: '@HEIGHT@'
      view: '@VIEW@'
      ray_tracing: '@RAYTRACING@'
      force_stackup_colors: true
      orthographic: false
      transparent_background: true
      transparent_background_color: '#00FF00'
      transparent_background_fuzz: 40

...
definitions:
  NAME: png_3d_viewer
  COMMENT: 3D viewer PCB render in PNG format
  DIR: 3d
  SUFFIX: 3d
  VIEW: top
  RAYTRACING: false
  ROTATE_X: 0
  ROTATE_Y: 0
  ROTATE_Z: 0
  ZOOM: 0
  WIDTH: 1600
  HEIGHT: 1600
