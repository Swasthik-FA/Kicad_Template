# ============================================================================
# KiBot config — VISUAL PRESET
# ----------------------------------------------------------------------------
# Used by:  feature-push.yml (Stage 1)
# Purpose:  Fast iteration. Generates schematic PDF + 2D/3D PCB renders so
#           the engineer can eyeball the work without being blocked on
#           ERC/DRC. Emphasis is on speed, not correctness.
#
# Why no SVG schematic export?
#   `kicad-cli sch export svg` is unreliable on projects with locally-
#   referenced symbol libraries (returns exit 3 with no useful stderr).
#   The PDF path goes through the same backend but is more tolerant.
#   The reference Fastbit KiBot project also avoids svg_sch_print for
#   the same reason.
# ============================================================================
kibot:
  version: 1

global:
  output: '%f-%i.%x'
  date_time_format: '%Y-%m-%d_%H-%M'
  # Suppress noisy warnings that don't affect output quality.
  filters:
    # W143 — deprecated preflight option (already cleaned, leave belt+braces)
    - number: 143
    # W009 — KiCad config without environment.vars section (irrelevant in CI)
    - number: 9
    # W010 — Unable to find KiCad 3D models (visual-only, OK to skip)
    - number: 10
    # W098 — 3D models downloaded or cached
    - number: 98
    # W004 — Field conflict between MANUFACTURER / Manufacturer (data hygiene)
    - number: 4
    # W037 — Field contains extra spaces (data hygiene)
    - number: 37

# ----------------------------------------------------------------------------
# Preflight: NOTHING. Visual-only preset must never block the developer.
# ----------------------------------------------------------------------------
preflight:
  run_erc: false
  run_drc: false
  check_zone_fills: false

# ----------------------------------------------------------------------------
# Outputs: only the renders that actually work reliably.
# ----------------------------------------------------------------------------
outputs:

  # --- Schematic as PDF ---------------------------------------------------
  # Single-document PDF, all sheets. This is the workhorse — the reference
  # Fastbit project also uses pdf_sch_print as the only schematic output.
  - name: schematic_pdf
    comment: "Schematic — PDF preview"
    type: pdf_sch_print
    dir: visual/schematic
    options:
      output: '%f-schematic.pdf'
      background_color: false

  # --- PCB top + bottom rendered as PNG via PcbDraw ------------------------
  # PcbDraw produces a clean 2D top-down render. Fast (no ray tracing).
  - name: pcb_top_png
    comment: "PCB top view — 2D PNG"
    type: pcbdraw
    dir: visual/pcb
    options:
      format: png
      dpi: 300
      output: '%f-pcb-top.png'
      bottom: false

  - name: pcb_bottom_png
    comment: "PCB bottom view — 2D PNG"
    type: pcbdraw
    dir: visual/pcb
    options:
      format: png
      dpi: 300
      output: '%f-pcb-bottom.png'
      bottom: true

  # --- PCB SVG layer prints (PCB SVG works fine; only SCH SVG is broken) ---
  - name: pcb_svg_top
    comment: "PCB top — SVG (copper + silk + mask)"
    type: pcb_print
    dir: visual/pcb
    options:
      format: SVG
      output: '%f-pcb-top.svg'
      pages:
        - layers:
            - F.Cu
            - F.Silkscreen
            - F.Mask
            - Edge.Cuts

  - name: pcb_svg_bottom
    comment: "PCB bottom — SVG (copper + silk + mask, mirrored)"
    type: pcb_print
    dir: visual/pcb
    options:
      format: SVG
      output: '%f-pcb-bottom.svg'
      pages:
        - layers:
            - B.Cu
            - B.Silkscreen
            - B.Mask
            - Edge.Cuts
          mirror: true

  # --- 3D PNG renders (this is the reference project's main PNG path) -----
  # ray_tracing: false → fast (~10–20s); good enough for feature-branch
  # previews. The full preset uses ray_tracing: true for nicer release renders.
  - name: png_3d_top
    comment: "3D viewer — top render (PNG)"
    type: render_3d
    dir: visual/3d
    options:
      output: '%f-3d-top.png'
      view: top
      ray_tracing: false
      width: 1600
      height: 1200
      auto_crop: true
      transparent_background: true

  - name: png_3d_bottom
    comment: "3D viewer — bottom render (PNG)"
    type: render_3d
    dir: visual/3d
    options:
      output: '%f-3d-bottom.png'
      view: bottom
      ray_tracing: false
      width: 1600
      height: 1200
      auto_crop: true
      transparent_background: true

  - name: png_3d_angled
    comment: "3D viewer — angled isometric (PNG)"
    type: render_3d
    dir: visual/3d
    options:
      output: '%f-3d-angled.png'
      view: top
      rotate_x: 30
      rotate_z: 20
      ray_tracing: false
      width: 1600
      height: 1200
      auto_crop: true
      transparent_background: true
