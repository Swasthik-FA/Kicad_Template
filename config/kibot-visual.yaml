# ============================================================================
# KiBot config — VISUAL PRESET
# ----------------------------------------------------------------------------
# Used by:  feature-push.yml (Stage 1)
# Purpose:  Fast iteration. Generates PNG + SVG previews of the schematic and
#           PCB so the engineer can eyeball the work without being blocked on
#           ERC/DRC. Emphasis is on speed, not correctness.
#
# What this config DOES NOT do (intentionally):
#   - Run ERC
#   - Run DRC
#   - Generate gerbers / drills / BOM / pick-place / 3D
#
# Outputs are written under the directory passed via `kibot -d <dir>`.
# ============================================================================
kibot:
  version: 1

# Project-level metadata. The actual values come from the .kicad_pro file
# at runtime; the variables below are KiBot string substitutions.
global:
  output: '%f-%i.%x'
  date_time_format: '%Y-%m-%d_%H-%M'

# ----------------------------------------------------------------------------
# Preflight: NOTHING. Visual-only preset must never block the developer.
# ----------------------------------------------------------------------------
preflight:
  run_erc: false
  run_drc: false
  check_zone_fills: false
  ignore_unconnected: true

# ----------------------------------------------------------------------------
# Outputs: just renders. Each output is a separate file/folder.
# ----------------------------------------------------------------------------
outputs:

  # --- Schematic as PNG (raster, easy to view in browser / GitHub) ---------
  - name: schematic_png
    comment: "Schematic — PNG raster preview"
    type: svg_sch_print
    dir: visual/schematic
    options:
      output: '%f-schematic.svg'

  # --- Schematic as PDF (single document, all sheets) ----------------------
  - name: schematic_pdf
    comment: "Schematic — PDF preview"
    type: pdf_sch_print
    dir: visual/schematic
    options:
      output: '%f-schematic.pdf'

  # --- PCB top + bottom rendered as PNG via PcbDraw -----------------------
  # PcbDraw gives a quick "marketing-style" board image. Good enough for
  # visual inspection on a feature branch.
  - name: pcb_top_png
    comment: "PCB top view — PNG render"
    type: pcbdraw
    dir: visual/pcb
    options:
      format: png
      dpi: 300
      output: '%f-pcb-top.png'
      bottom: false

  - name: pcb_bottom_png
    comment: "PCB bottom view — PNG render"
    type: pcbdraw
    dir: visual/pcb
    options:
      format: png
      dpi: 300
      output: '%f-pcb-bottom.png'
      bottom: true

  # --- PCB SVG layer prints (per-side, all relevant layers stacked) -------
  - name: pcb_svg_top
    comment: "PCB top — SVG (copper + silk + mask)"
    type: pcb_print
    dir: visual/pcb
    options:
      format: SVG
      output: '%f-pcb-top.svg'
      pages:
        - layers:
            - F.Cu
            - F.Silkscreen
            - F.Mask
            - Edge.Cuts

  - name: pcb_svg_bottom
    comment: "PCB bottom — SVG (copper + silk + mask, mirrored)"
    type: pcb_print
    dir: visual/pcb
    options:
      format: SVG
      output: '%f-pcb-bottom.svg'
      pages:
        - layers:
            - B.Cu
            - B.Silkscreen
            - B.Mask
            - Edge.Cuts
          mirror: true
