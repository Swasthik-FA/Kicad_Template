# ============================================================================
# KiBot config — VISUAL PRESET
# ----------------------------------------------------------------------------
# Used by:  feature-push.yml (Stage 1)
# Purpose:  Schematic PDF + 3D PNG renders for fast feature-branch previews.
#
# Modeled directly on the Fastbit reference project's
#   kibot_yaml/kibot_out_pdf_schematic.yaml
#   kibot_yaml/kibot_out_png_3d_viewer.yaml
#   kibot_yaml/kibot_globals.yaml
# (templates expanded inline; same option set, same warning filters).
# ============================================================================
kibot:
  version: 1

global:
  date_time_format: '%Y-%m-%d_%H-%M'
  # Same warning numbers the reference suppresses — these are noisy and
  # don't affect output correctness in CI.
  filters:
    # 'KiCad config without environment.vars section'
    - number: 9
    # 'Unable to find KiCad 3D models'
    - number: 10
    # 'More than one SCH file found'
    - number: 44
    # 3D models downloaded or cached
    - number: 98
    # 'This output depends on KiCad version, use blender_export instead'
    - number: 143
    # Field conflict between MANUFACTURER / Manufacturer (data hygiene)
    - number: 4
    # Field contains extra spaces (data hygiene)
    - number: 37

# Visual preset is fast iteration only — never run ERC/DRC here.
preflight:
  run_erc: false
  run_drc: false
  check_zone_fills: false

outputs:

  # --------------------------------------------------------------------------
  # NOTE: Schematic PDF intentionally OMITTED from the visual preset.
  # `kicad-cli sch export pdf` returns exit 3 on this project's .kicad_sch
  # (every format — pdf, svg — fails the same way). KiBot is strict and
  # halts on the first output failure, so including the schematic here
  # blocks every PNG render that comes after it. The schematic export
  # remains in the FULL preset (kibot-full.yaml) for QA/release builds
  # — and we'll diagnose the underlying schematic issue separately.
  # --------------------------------------------------------------------------
  # 3D viewer PNG renders — top, bottom, angled isometric.
  # All three mirror the reference's kibot_out_png_3d_viewer.yaml options.
  # ray_tracing kept FALSE for the visual preset (fast); the full preset
  # used by Stage 3+ enables ray_tracing for nicer release renders.
  # --------------------------------------------------------------------------
  - name: png_3d_top
    comment: 3D viewer PCB render in PNG format — top
    type: render_3d
    dir: visual/3d
    options:
      output: '%f-3d-top.png'
      auto_crop: true
      enable_crop_workaround: true
      rotate_x: 0
      rotate_y: 0
      rotate_z: 0
      zoom: 0
      height: 1600
      width: 1600
      view: top
      ray_tracing: false
      force_stackup_colors: true
      orthographic: false
      transparent_background: true
      transparent_background_color: '#00FF00'
      transparent_background_fuzz: 40

  - name: png_3d_bottom
    comment: 3D viewer PCB render in PNG format — bottom
    type: render_3d
    dir: visual/3d
    options:
      output: '%f-3d-bottom.png'
      auto_crop: true
      enable_crop_workaround: true
      rotate_x: 0
      rotate_y: 0
      rotate_z: 0
      zoom: 0
      height: 1600
      width: 1600
      view: bottom
      ray_tracing: false
      force_stackup_colors: true
      orthographic: false
      transparent_background: true
      transparent_background_color: '#00FF00'
      transparent_background_fuzz: 40

  - name: png_3d_angled
    comment: 3D viewer PCB render in PNG format — angled isometric
    type: render_3d
    dir: visual/3d
    options:
      output: '%f-3d-angled.png'
      auto_crop: true
      enable_crop_workaround: true
      rotate_x: 30
      rotate_y: 0
      rotate_z: 20
      zoom: 0
      height: 1600
      width: 1600
      view: top
      ray_tracing: false
      force_stackup_colors: true
      orthographic: false
      transparent_background: true
      transparent_background_color: '#00FF00'
      transparent_background_fuzz: 40
