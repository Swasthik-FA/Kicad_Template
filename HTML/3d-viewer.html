<!doctype html>
<!--
  Standalone full-page 3D viewer.
  Substituted at CI publish time:
    Nano-Board-rev-2      - shown in the page <title>
    3d/Nano-Board-rev-2.glb    - URL to the GLB (relative path from this file)
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nano-Board-rev-2 — Interactive 3D Model</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0A0E1A;
    color: #E6E9F2;
    overflow: hidden;
    background-image:
      radial-gradient(820px 620px at 8% -12%, rgba(99,102,241,0.42), transparent 60%),
      radial-gradient(680px 520px at 96% -4%, rgba(14,165,233,0.32), transparent 65%),
      radial-gradient(720px 580px at 88% 105%, rgba(236,72,153,0.28), transparent 62%),
      radial-gradient(760px 600px at 4% 110%, rgba(168,85,247,0.34), transparent 60%);
  }

  /* "Interactive 3D Model" heading — accent bar + gradient text fill,
     mirrors the .output-comment style from the navigate page so the
     two pages feel continuous. */
  .heading {
    position: fixed; top: 22px; left: 28px;
    z-index: 10; pointer-events: none;
    font-size: 1.05rem;
    font-weight: 800;
    letter-spacing: -0.01em;
    padding-left: 18px;
    line-height: 1.2;
    background-image: linear-gradient(90deg, #818CF8 0%, #6366F1 35%, #E6E9F2 100%);
    -webkit-background-clip: text;
            background-clip: text;
    -webkit-text-fill-color: transparent;
            color: transparent;
  }
  .heading::before {
    content: "";
    position: absolute;
    left: 0; top: 50%;
    transform: translateY(-50%);
    width: 4px; height: 22px;
    border-radius: 999px;
    background: linear-gradient(180deg, #818CF8, #6366F1);
    box-shadow: 0 0 16px rgba(99,102,241,.55), 0 0 4px rgba(99,102,241,.6);
  }

  model-viewer {
    width: 100vw; height: 100vh; display: block;
    background: transparent;
    --poster-color: transparent;
  }

  .loader, .err {
    position: fixed; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; color: #94A0B8; pointer-events: none;
    transition: opacity .3s ease;
  }
  .err { display: none; color: #F87171; padding: 24px; text-align: center; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(255,255,255,0.10);
    border-top-color: #818CF8;
    border-radius: 50%;
    animation: spin .9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="heading">Interactive 3D Model</div>

  <div class="loader" id="loader">
    <div class="spinner"></div>
    <div>Loading 3D model…</div>
  </div>

  <div class="err" id="err"></div>

  <model-viewer
    id="viewer"
    src="3d/Nano-Board-rev-2.glb"
    alt="Interactive 3D PCB model"
    camera-controls
    touch-action="pan-y"
    shadow-intensity="1"
    exposure="1.1"
    environment-image="neutral"
    interaction-prompt="auto"
    auto-rotate-delay="3000">
  </model-viewer>

  <script type="module"
          src="https://cdn.jsdelivr.net/npm/@google/model-viewer@4.0.0/dist/model-viewer.min.js"></script>

  <script>
    var loader = document.getElementById('loader');
    var err = document.getElementById('err');
    var viewer = document.getElementById('viewer');
    viewer.addEventListener('load', function () {
      loader.style.opacity = '0';
      setTimeout(function () { loader.style.display = 'none'; }, 350);
    });
    viewer.addEventListener('error', function () {
      loader.style.display = 'none';
      err.style.display = 'flex';
      err.textContent =
        'Failed to load the 3D model. If you opened this page from disk, ' +
        'the <model-viewer> ES module is blocked. Open it on GitHub Pages ' +
        'or via a local web server (python -m http.server).';
    });
    setTimeout(function () {
      if (loader.style.display !== 'none') {
        err.style.display = 'flex';
        err.textContent =
          'The 3D viewer is taking too long. Most likely the page is opened ' +
          'from disk (file://) which blocks ES module loading. Open it on ' +
          'GitHub Pages or via "python -m http.server".';
      }
    }, 25000);
  </script>
</body>
</html>
