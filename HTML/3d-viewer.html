<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Nano-Board-rev-2 — 3D Viewer</title>
<style>
  :root { color-scheme: dark; --bg:#0b0f1a; --bg-2:#11172a; --fg:#e6e9f2; --muted:#94a0b8; --accent:#6366f1; --accent-2:#a78bfa; --border:rgba(255,255,255,.08); }
  * { box-sizing: border-box; }
  html, body { margin:0; height:100%; background:var(--bg); color:var(--fg); font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; overflow:hidden; }
  #stage { position:fixed; inset:0; }
  canvas { display:block; width:100%; height:100%; touch-action:none; }

  header.bar {
    position:fixed; top:0; left:0; right:0; z-index:10;
    display:flex; align-items:center; gap:12px;
    padding: 12px 16px;
    background: linear-gradient(180deg, rgba(11,15,26,.85) 0%, rgba(11,15,26,0) 100%);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    pointer-events:none;
  }
  header.bar .title { font-size: 14px; font-weight: 600; letter-spacing:.02em; pointer-events:auto; }
  header.bar .sub { font-size: 12px; color: var(--muted); pointer-events:auto; }

  .controls {
    position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
    z-index: 10;
    display:flex; gap:8px; flex-wrap:wrap; justify-content:center;
    padding: 8px;
    background: rgba(17,23,42,.78);
    border: 1px solid var(--border);
    border-radius: 999px;
    box-shadow: 0 12px 32px -12px rgba(0,0,0,.6);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  .btn {
    appearance:none; border:1px solid var(--border); background: rgba(255,255,255,.04);
    color: var(--fg); font-size: 13px; font-weight: 500;
    padding: 9px 14px; border-radius: 999px; cursor: pointer;
    display:inline-flex; align-items:center; gap:6px;
    transition: background .18s, border-color .18s, transform .15s;
  }
  .btn:hover { background: rgba(99,102,241,.18); border-color: var(--accent); }
  .btn:active { transform: translateY(1px); }
  .btn svg { width:15px; height:15px; }

  .info {
    position: fixed; right: 16px; bottom: 16px; z-index: 10;
    font-size: 11px; color: var(--muted);
    background: rgba(17,23,42,.6); padding: 6px 10px; border-radius: 8px;
    border: 1px solid var(--border);
  }

  .loader-wrap {
    position: fixed; inset: 0; z-index: 20;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap: 18px;
    background: radial-gradient(ellipse at center, rgba(99,102,241,.10), rgba(11,15,26,.96) 65%);
    transition: opacity .4s ease;
  }
  .loader-wrap.hidden { opacity:0; pointer-events:none; }
  .spinner {
    width: 56px; height: 56px; border-radius: 50%;
    border: 3px solid rgba(255,255,255,.10);
    border-top-color: var(--accent);
    border-right-color: var(--accent-2);
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-text { font-size: 13px; color: var(--muted); letter-spacing:.04em; text-transform: uppercase; }
  .loader-progress { width: 220px; height: 3px; background: rgba(255,255,255,.06); border-radius: 999px; overflow: hidden; }
  .loader-progress > i { display:block; height:100%; width:0%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); transition: width .15s linear; }

  .error-wrap {
    position: fixed; inset: 0; z-index: 25; display:none;
    align-items:center; justify-content:center; padding: 24px;
    background: rgba(11,15,26,.95);
  }
  .error-wrap.show { display:flex; }
  .error-card { max-width: 480px; padding: 24px; background: var(--bg-2); border:1px solid var(--border); border-radius: 14px; text-align:center; }
  .error-card h2 { margin: 0 0 8px; font-size: 16px; }
  .error-card p { margin: 0; font-size: 13px; color: var(--muted); line-height: 1.5; }

  @media (max-width: 600px) {
    .btn { padding: 8px 12px; font-size: 12px; }
    .btn .lbl { display:none; }
    .controls { bottom: 16px; gap: 6px; padding: 6px; }
    .info { display:none; }
    header.bar { padding: 10px 12px; }
  }
</style>
</head>
<body>

<header class="bar">
  <div>
    <div class="title">Nano-Board-rev-2</div>
    <div class="sub">Interactive 3D PCB Viewer</div>
  </div>
</header>

<div id="stage"></div>

<div class="controls" role="toolbar" aria-label="Viewer controls">
  <button class="btn" id="btn-reset" title="Reset camera">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg>
    <span class="lbl">Reset</span>
  </button>
  <button class="btn" id="btn-bg" title="Toggle background">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 0 0 0 18"/></svg>
    <span class="lbl">Background</span>
  </button>
</div>

<div class="info" id="info">Drag: rotate · Right-drag: pan · Scroll: zoom</div>

<div class="loader-wrap" id="loader">
  <div class="spinner" aria-hidden="true"></div>
  <div class="loader-text" id="loader-text">Loading PCB…</div>
  <div class="loader-progress"><i id="loader-bar"></i></div>
</div>

<div class="error-wrap" id="error">
  <div class="error-card">
    <h2>Could not load the 3D model</h2>
    <p id="error-msg">Most likely the page was opened from the local filesystem. Open it from GitHub Pages, or run a local web server.</p>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three":            "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
    "three/addons/":    "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls }     from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader }        from 'three/addons/loaders/GLTFLoader.js';
import { MeshoptDecoder }    from 'three/addons/libs/meshopt_decoder.module.js';
import { RoomEnvironment }   from 'three/addons/environments/RoomEnvironment.js';

const GLB_URL = "3d/Nano-Board-rev-2.glb";

// --- Renderer / scene ---------------------------------------------------------
const stage = document.getElementById('stage');
const renderer = new THREE.WebGLRenderer({
  antialias: true,
  alpha: false,
  powerPreference: 'high-performance',
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
stage.appendChild(renderer.domElement);

const scene = new THREE.Scene();

// Environment for realistic metallic reflections (gold pads, etc.)
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

// Two-tone background list, cycled by the toggle button.
const BACKGROUNDS = [
  { name: 'dark',    color: 0x0b0f1a, fog: 0x0b0f1a },
  { name: 'studio',  color: 0x1a2236, fog: 0x1a2236 },
  { name: 'light',   color: 0xeef1f6, fog: 0xeef1f6 },
];
let bgIndex = 0;
function applyBackground() {
  const b = BACKGROUNDS[bgIndex];
  scene.background = new THREE.Color(b.color);
  scene.fog = new THREE.Fog(b.fog, 400, 1600);
}
applyBackground();

// --- Camera + controls --------------------------------------------------------
const camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 5000);
camera.position.set(0, 180, 260);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.rotateSpeed = 0.9;
controls.panSpeed = 0.9;
controls.zoomSpeed = 0.9;
controls.minDistance = 30;
controls.maxDistance = 1200;
controls.target.set(0, 0, 0);

// --- Lighting -----------------------------------------------------------------
const ambient = new THREE.AmbientLight(0xffffff, 0.45);
scene.add(ambient);

const keyLight = new THREE.DirectionalLight(0xffffff, 1.7);
keyLight.position.set(180, 260, 220);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
keyLight.shadow.camera.near = 1;
keyLight.shadow.camera.far = 1200;
keyLight.shadow.camera.left = -300;
keyLight.shadow.camera.right = 300;
keyLight.shadow.camera.top = 300;
keyLight.shadow.camera.bottom = -300;
keyLight.shadow.bias = -0.0002;
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0xb0c4ff, 0.55);
fillLight.position.set(-220, 120, -160);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xfff2cc, 0.35);
rimLight.position.set(0, -200, -260);
scene.add(rimLight);

// Subtle ground catcher (only visible on light background).
const groundGeo = new THREE.PlaneGeometry(2000, 2000);
const groundMat = new THREE.ShadowMaterial({ opacity: 0.18 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// --- Load the GLB -------------------------------------------------------------
const loader = new GLTFLoader();
loader.setMeshoptDecoder(MeshoptDecoder);

const loaderEl = document.getElementById('loader');
const loaderBar = document.getElementById('loader-bar');
const loaderText = document.getElementById('loader-text');
const errorEl = document.getElementById('error');
const errorMsg = document.getElementById('error-msg');

let pcbModel = null;
let pcbBox = new THREE.Box3();
let pcbCenter = new THREE.Vector3();
let pcbSize = new THREE.Vector3();
let defaultCam = { pos: new THREE.Vector3(), target: new THREE.Vector3() };

const loadTimeout = setTimeout(() => {
  if (!pcbModel) {
    loaderText.textContent = 'Still loading…';
  }
}, 8000);

loader.load(
  GLB_URL,
  (gltf) => {
    clearTimeout(loadTimeout);
    pcbModel = gltf.scene;

    let meshCount = 0;
    pcbModel.traverse(o => { if (o.isMesh) meshCount++; });
    if (meshCount === 0) {
      loaderEl.classList.add('hidden');
      errorEl.classList.add('show');
      errorMsg.textContent = 'GLB loaded but contains 0 meshes (likely a broken compression step in CI).';
      return;
    }

    pcbModel.traverse(obj => {
      if (obj.isMesh) {
        obj.castShadow = true;
        obj.receiveShadow = true;
        if (obj.material) {
          // KiCad's GLB uses physically-based materials; just bump shading quality.
          if ('envMapIntensity' in obj.material) obj.material.envMapIntensity = 1.0;
          obj.material.needsUpdate = true;
        }
      }
    });

    scene.add(pcbModel);

    // Frame the model.
    pcbBox.setFromObject(pcbModel);
    pcbBox.getCenter(pcbCenter);
    pcbBox.getSize(pcbSize);

    // Center the model at origin so rotations behave intuitively.
    pcbModel.position.sub(pcbCenter);
    pcbBox.setFromObject(pcbModel);
    pcbBox.getCenter(pcbCenter);

    // Position ground just under the board.
    ground.position.y = pcbBox.min.y - Math.max(2, pcbSize.y * 0.05);

    frameView('iso');
    defaultCam.pos.copy(camera.position);
    defaultCam.target.copy(controls.target);

    requestAnimationFrame(() => {
      loaderEl.classList.add('hidden');
      setTimeout(() => loaderEl.remove(), 500);
    });
  },
  (xhr) => {
    if (xhr.lengthComputable) {
      const pct = (xhr.loaded / xhr.total) * 100;
      loaderBar.style.width = pct.toFixed(1) + '%';
    } else if (xhr.loaded) {
      // Server didn't send Content-Length — show indeterminate-ish progress.
      const fakePct = Math.min(95, (xhr.loaded / (1024 * 1024)) * 8);
      loaderBar.style.width = fakePct.toFixed(1) + '%';
    }
  },
  (err) => {
    clearTimeout(loadTimeout);
    console.error(err);
    loaderEl.classList.add('hidden');
    errorEl.classList.add('show');
    if (location.protocol === 'file:') {
      errorMsg.textContent =
        'This page was opened from the local filesystem (file://). ' +
        'Browsers block ES module imports and large GLB fetches over file://. ' +
        'Open the page on GitHub Pages, or run "python -m http.server" in the project root.';
    } else {
      errorMsg.textContent = 'Failed to load ' + GLB_URL + ': ' + (err.message || err);
    }
  }
);

// --- View framing helpers -----------------------------------------------------
function frameView(mode) {
  if (!pcbModel) return;
  // pcbModel is centered at origin, so use its size.
  const maxDim = Math.max(pcbSize.x, pcbSize.y, pcbSize.z);
  const fitDist = maxDim / (2 * Math.tan((Math.PI * camera.fov) / 360));
  const dist = fitDist * 1.55;

  camera.position.set(dist * 0.65, dist * 0.55, dist * 0.85);
  controls.target.set(0, 0, 0);
  camera.near = Math.max(0.1, dist / 1000);
  camera.far  = dist * 20;
  camera.updateProjectionMatrix();
  controls.update();
}

// --- UI buttons ---------------------------------------------------------------
document.getElementById('btn-reset').addEventListener('click',  () => {
  if (!pcbModel) return;
  camera.position.copy(defaultCam.pos);
  controls.target.copy(defaultCam.target);
  controls.update();
});
document.getElementById('btn-bg').addEventListener('click', () => {
  bgIndex = (bgIndex + 1) % BACKGROUNDS.length;
  applyBackground();
});

// --- Resize + render loop -----------------------------------------------------
function onResize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', onResize);
onResize();

renderer.setAnimationLoop(() => {
  controls.update();
  renderer.render(scene, camera);
});
</script>
</body>
</html>
