# ============================================================================
# Stage 2 — Pull request into `dev` (MERGE GATE)
# ----------------------------------------------------------------------------
# Trigger:  PR opened/updated/reopened targeting `dev`.
# Gate:     ERC + DRC via KiBot preflights (honors .kicad_pro rule_severities,
#           unlike kicad-cli). We parse the JSON report and count
#           error-severity entries ourselves.
#           If any errors, the job fails, the PR is blocked, and a comment
#           is posted with a link to the error-report artifact.
# Outputs (on pass): visual group + interactive HTML BOM for reviewer
#           inspection, uploaded as `pr-review-<PR#>` artifact.
#
# REQUIRED branch protection on `dev`:
#   Settings → Branches → Add ruleset → Required status check:
#       "ERC + DRC gate"   (the job name below)
# ============================================================================
name: PR to dev — ERC/DRC gate

on:
  pull_request:
    branches: [dev]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

env:
  KICAD_PROJECT_DIR: hardware
  KICAD_PROJECT: Nano-Board-rev-2
  KIBOT_CONFIG: config/kibot/kibot_main.yaml
  KIBOT_LOG: kibot_run.log

jobs:
  gate:
    name: ERC + DRC gate
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/inti-cmnb/kicad_auto:ki9
      options: --user root

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------------------------------------------------
      # Enforce source-branch policy: PRs into `dev` must come from a
      # `feature/*` branch. Fails the job (and so blocks the merge) early
      # if the head ref does not start with feature/.
      # ----------------------------------------------------------------------
      - name: Enforce feature/* source branch
        run: |
          HEAD_REF="${{ github.event.pull_request.head.ref }}"
          echo "PR head ref: $HEAD_REF"
          if [[ "$HEAD_REF" != feature/* ]]; then
            echo "::error::PRs into 'dev' must come from a 'feature/*' branch. Got: $HEAD_REF"
            exit 1
          fi

      - name: Prepare reports directory
        run: mkdir -p output/reports

      # ----------------------------------------------------------------------
      # Phase 1 auto-detect: schematic-only repos skip DRC. The PCB file's
      # presence drives whether we pass -b and whether we --skip-pre drc.
      # ----------------------------------------------------------------------
      - name: Detect PCB presence
        id: detect
        run: |
          if [[ -f "${KICAD_PROJECT_DIR}/${KICAD_PROJECT}.kicad_pcb" ]]; then
            echo "has_pcb=true" >> "$GITHUB_OUTPUT"
            echo "PCB found — running ERC + DRC."
          else
            echo "has_pcb=false" >> "$GITHUB_OUTPUT"
            echo "No PCB file — running ERC only, DRC will be skipped."
          fi

      # ----------------------------------------------------------------------
      # ERC (+ DRC if PCB exists) via KiBot's `gate_only` group.
      # The preflights honor the project's rule_severities (from .kicad_pro)
      # exactly like the KiCad GUI; `kicad-cli` would NOT apply those
      # overrides and silently misses errors the GUI would flag (e.g.
      # hole_clearance promoted to error). Preflight outputs land as
      # erc-erc.{html,rpt,json} and drc-drc.{html,rpt,json}. dont_stop=true
      # on the DRC preflight keeps KiBot going past violations; the gate
      # below counts JSON entries with severity=error.
      # ----------------------------------------------------------------------
      - name: ERC + DRC via KiBot (gate_only group)
        run: |
          set +e
          if [[ "${{ steps.detect.outputs.has_pcb }}" == "true" ]]; then
            kibot \
              -c "${KIBOT_CONFIG}" \
              -d output \
              -e "${KICAD_PROJECT_DIR}/${KICAD_PROJECT}.kicad_sch" \
              -b "${KICAD_PROJECT_DIR}/${KICAD_PROJECT}.kicad_pcb" \
              --log "${KIBOT_LOG}" \
              gate_only || true
          else
            kibot \
              -c "${KIBOT_CONFIG}" \
              -d output \
              -e "${KICAD_PROJECT_DIR}/${KICAD_PROJECT}.kicad_sch" \
              --log "${KIBOT_LOG}" \
              --skip-pre drc \
              gate_only || true
          fi

      # ----------------------------------------------------------------------
      # Count error-severity violations from the JSON reports.
      # Emit results as step outputs so later steps can branch on them.
      # ----------------------------------------------------------------------
      - name: Count violations
        id: count
        env:
          HAS_PCB: ${{ steps.detect.outputs.has_pcb }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json, os
          def tally(path):
              try:
                  j = json.load(open(path))
              except Exception:
                  return 0, 0
              e = w = 0
              for sh in j.get('sheets', [j]):
                  for v in sh.get('violations', []) or []:
                      sev = (v.get('severity') or '').lower()
                      if sev == 'error': e += 1
                      elif sev == 'warning': w += 1
              for s in ('unconnected_items', 'schematic_parity'):
                  for v in j.get(s, []) or []:
                      sev = (v.get('severity') or '').lower()
                      if sev == 'error': e += 1
                      elif sev == 'warning': w += 1
              return e, w
          has_pcb = os.environ.get('HAS_PCB') == 'true'
          ee, ew = tally('output/reports/erc-erc.json')
          if has_pcb:
              de, dw = tally('output/reports/drc-drc.json')
              drc_e, drc_w = str(de), str(dw)
              total = ee + de
          else:
              drc_e, drc_w = 'skipped', 'skipped'
              total = ee
          print(f"has_pcb={'true' if has_pcb else 'false'}")
          print(f"erc_errors={ee}")
          print(f"erc_warnings={ew}")
          print(f"drc_errors={drc_e}")
          print(f"drc_warnings={drc_w}")
          print(f"total_errors={total}")
          PY

      # ======================================================================
      # PHASE 2 — Generic schematic validator (power pins + decoupling caps)
      # ----------------------------------------------------------------------
      # Independent of Phase 1. Exports a KiCad XML netlist and runs a
      # heuristic checker that classifies pins by name + electrical type and
      # walks net membership. No per-project config — works on any KiCad
      # project. Errors block the merge; warnings are advisory.
      # ======================================================================
      - name: Phase 2 — Export KiCad XML netlist
        id: netlist
        run: |
          set +e
          mkdir -p output/reports
          kicad-cli sch export netlist \
            --format kicadxml \
            -o output/reports/netlist.xml \
            "${KICAD_PROJECT_DIR}/${KICAD_PROJECT}.kicad_sch"
          if [[ -s output/reports/netlist.xml ]]; then
            echo "netlist_ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "netlist_ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Netlist export failed; Phase 2 will be skipped."
          fi

      - name: Phase 2 — Schematic validator (power + decoupling)
        id: phase2_run
        if: steps.netlist.outputs.netlist_ok == 'true'
        run: |
          python3 config/schematic_validator.py \
            --netlist     output/reports/netlist.xml \
            --report-html output/reports/schematic-validator.html \
            --report-json output/reports/schematic-validator.json

      - name: Phase 2 — Count violations
        id: phase2
        if: always()
        env:
          NETLIST_OK: ${{ steps.netlist.outputs.netlist_ok }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json, os
          if os.environ.get('NETLIST_OK') != 'true':
              print('phase2_status=skipped')
              print('phase2_errors=skipped')
              print('phase2_warnings=skipped')
              print('phase2_error_count=0')
              raise SystemExit(0)
          try:
              j = json.load(open('output/reports/schematic-validator.json'))
              e, w = len(j.get('errors', [])), len(j.get('warnings', []))
              print('phase2_status=ran')
              print(f'phase2_errors={e}')
              print(f'phase2_warnings={w}')
              print(f'phase2_error_count={e}')
          except Exception as exc:
              print('phase2_status=failed')
              print('phase2_errors=?')
              print('phase2_warnings=?')
              print('phase2_error_count=0')
              print(f'::warning::Phase 2 result parse failed: {exc}', file=__import__("sys").stderr)
          PY

      # ----------------------------------------------------------------------
      # Sticky PR summary: one comment per PR, updated each run. Marker
      # <!-- erc-drc-gate --> lets peter-evans/find-comment locate and
      # rewrite the same comment instead of stacking new ones. Posts on
      # both pass and fail, so the PR always shows the latest state.
      # ----------------------------------------------------------------------
      - name: Find existing gate comment
        id: find_comment
        if: always()
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- erc-drc-gate -->'

      - name: Post sticky PR summary
        if: always()
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find_comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            <!-- erc-drc-gate -->
            ### ${{ (steps.count.outputs.total_errors == '0' && steps.phase2.outputs.phase2_error_count == '0') && '✅ All gates passed — merge allowed' || '❌ Gate failed — merge blocked' }}

            **Phase 1 — KiCad ERC / DRC**
            ${{ steps.count.outputs.has_pcb == 'false' && '_No `.kicad_pcb` found — DRC skipped (schematic-only repo)._' || '' }}

            | Check | Errors | Warnings |
            |-------|-------:|---------:|
            | ERC   | ${{ steps.count.outputs.erc_errors }} | ${{ steps.count.outputs.erc_warnings }} |
            | DRC   | ${{ steps.count.outputs.drc_errors }} | ${{ steps.count.outputs.drc_warnings }} |

            **Phase 2 — Schematic validator (power pins + decoupling)**
            ${{ steps.phase2.outputs.phase2_status == 'skipped' && '_Netlist export failed — Phase 2 skipped._' || '' }}

            | Check               | Errors | Warnings |
            |---------------------|-------:|---------:|
            | Schematic validator | ${{ steps.phase2.outputs.phase2_errors }} | ${{ steps.phase2.outputs.phase2_warnings }} |

            See the [workflow run ↗](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for raw logs and the `schematic-validator.html` report.${{ (steps.count.outputs.total_errors != '0' || steps.phase2.outputs.phase2_error_count != '0') && '

            **Please fix the issues before merging.**' || '' }}

      # ----------------------------------------------------------------------
      # Enable GitHub auto-merge on the PR. This does NOT merge immediately —
      # it tells GitHub to merge the PR as soon as all required status checks
      # pass and review requirements are satisfied. Requires:
      #   - Repo Settings → General → "Allow auto-merge" enabled
      #   - "ERC + DRC gate" configured as required check on `dev`
      # If the gate fails below, this is harmless: auto-merge waits for green.
      # ----------------------------------------------------------------------
      - name: Enable auto-merge
        if: steps.count.outputs.total_errors == '0' && steps.phase2.outputs.phase2_error_count == '0'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --auto --squash || true

      - name: Fail job if any gate has errors
        if: steps.count.outputs.total_errors != '0' || steps.phase2.outputs.phase2_error_count != '0'
        run: |
          echo "::error::Phase 1: ERC=${{ steps.count.outputs.erc_errors }} DRC=${{ steps.count.outputs.drc_errors }} | Phase 2: schematic-validator errors=${{ steps.phase2.outputs.phase2_errors }}. Merge blocked."
          exit 1
