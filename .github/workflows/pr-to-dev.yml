# ============================================================================
# Stage 2 — Pull request into `dev` (MERGE GATE)
# ----------------------------------------------------------------------------
# Trigger:  PR opened/updated/reopened targeting `dev`.
# Gate:     ERC + DRC via KiBot preflights (honors .kicad_pro rule_severities,
#           unlike kicad-cli). We parse the JSON report and count
#           error-severity entries ourselves.
#           If any errors, the job fails, the PR is blocked, and a comment
#           is posted with a link to the error-report artifact.
# Outputs (on pass): visual group + interactive HTML BOM for reviewer
#           inspection, uploaded as `pr-review-<PR#>` artifact.
#
# REQUIRED branch protection on `dev`:
#   Settings → Branches → Add ruleset → Required status check:
#       "ERC + DRC gate"   (the job name below)
# ============================================================================
name: PR to dev — ERC/DRC gate

on:
  pull_request:
    branches: [dev]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

env:
  KICAD_PROJECT_DIR: hardware
  KICAD_PROJECT: Nano-Board-rev-2
  KIBOT_CONFIG: config/kibot/kibot_main.yaml
  KIBOT_LOG: kibot_run.log

jobs:
  gate:
    name: ERC + DRC gate
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/inti-cmnb/kicad_auto:ki9
      options: --user root

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare reports directory
        run: mkdir -p output/reports

      # ----------------------------------------------------------------------
      # ERC + DRC — run via KiBot preflights so the project's rule_severities
      # (from .kicad_pro) are honored exactly like the KiCad GUI. `kicad-cli`
      # would NOT apply those overrides and silently misses errors that the
      # GUI would flag (e.g. hole_clearance promoted to error). Outputs land
      # as erc-erc.{html,rpt,json} and drc-drc.{html,rpt,json}. KiBot's
      # preflight DRC has dont_stop=true so KiBot exits 0 even with errors;
      # the gate below counts JSON entries with severity=error.
      # ----------------------------------------------------------------------
      - name: ERC + DRC via KiBot preflight
        run: |
          set +e
          kibot \
            -c "${KIBOT_CONFIG}" \
            -d output \
            -e "${KICAD_PROJECT_DIR}/${KICAD_PROJECT}.kicad_sch" \
            -b "${KICAD_PROJECT_DIR}/${KICAD_PROJECT}.kicad_pcb" \
            --log "${KIBOT_LOG}" \
            --only-pre || true

      # ----------------------------------------------------------------------
      # Count error-severity violations from the JSON reports.
      # Emit results as step outputs so later steps can branch on them.
      # ----------------------------------------------------------------------
      - name: Count violations
        id: count
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json, os
          def tally(path):
              try:
                  j = json.load(open(path))
              except Exception:
                  return 0, 0
              e = w = 0
              for sh in j.get('sheets', [j]):
                  for v in sh.get('violations', []) or []:
                      sev = (v.get('severity') or '').lower()
                      if sev == 'error': e += 1
                      elif sev == 'warning': w += 1
              for s in ('unconnected_items', 'schematic_parity'):
                  for v in j.get(s, []) or []:
                      sev = (v.get('severity') or '').lower()
                      if sev == 'error': e += 1
                      elif sev == 'warning': w += 1
              return e, w
          ee, ew = tally('output/reports/erc-erc.json')
          de, dw = tally('output/reports/drc-drc.json')
          print(f"erc_errors={ee}")
          print(f"erc_warnings={ew}")
          print(f"drc_errors={de}")
          print(f"drc_warnings={dw}")
          print(f"total_errors={ee + de}")
          PY

      # ----------------------------------------------------------------------
      # Always generate the HTML error report (clean run = green report).
      # ----------------------------------------------------------------------
      - name: Generate error report HTML
        if: always()
        run: |
          python3 config/generate_error_report.py \
            --erc-json output/reports/erc-erc.json \
            --drc-json output/reports/drc-drc.json \
            --erc-rpt  output/reports/erc-erc.rpt \
            --drc-rpt  output/reports/drc-drc.rpt \
            --output   output/error-report.html

      - name: Upload error report (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: error-report
          path: output/error-report.html
          retention-days: 14
          if-no-files-found: warn

      # ----------------------------------------------------------------------
      # On pass: produce visual + iBOM artifacts for the reviewer.
      # ----------------------------------------------------------------------
      - name: KiBot — visual group (only if gate passes)
        if: steps.count.outputs.total_errors == '0'
        run: |
          set +e
          kibot \
            -c "${KIBOT_CONFIG}" \
            -d output \
            -e "${KICAD_PROJECT_DIR}/${KICAD_PROJECT}.kicad_sch" \
            -b "${KICAD_PROJECT_DIR}/${KICAD_PROJECT}.kicad_pcb" \
            --skip-pre erc,drc \
            --log "${KIBOT_LOG}" \
            visual

      - name: Upload PR review artifacts (only if gate passes)
        if: steps.count.outputs.total_errors == '0'
        uses: actions/upload-artifact@v4
        with:
          name: pr-review-${{ github.event.pull_request.number }}
          path: |
            output/
            ${{ env.KIBOT_LOG }}
          retention-days: 14
          if-no-files-found: warn

      # ----------------------------------------------------------------------
      # On fail: comment on the PR pointing at the error-report artifact.
      # ----------------------------------------------------------------------
      - name: Comment on PR (on failure)
        if: steps.count.outputs.total_errors != '0'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ❌ **ERC / DRC failed — merge blocked.**

            ERC: **${{ steps.count.outputs.erc_errors }}** error(s), ${{ steps.count.outputs.erc_warnings }} warning(s)
            DRC: **${{ steps.count.outputs.drc_errors }}** error(s), ${{ steps.count.outputs.drc_warnings }} warning(s)

            Download the [`error-report` artifact ↗](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) and open `error-report.html` for the full violations list.

      - name: Fail job if ERC/DRC errors
        if: steps.count.outputs.total_errors != '0'
        run: |
          echo "::error::ERC=${{ steps.count.outputs.erc_errors }} DRC=${{ steps.count.outputs.drc_errors }} errors. Merge blocked."
          exit 1
