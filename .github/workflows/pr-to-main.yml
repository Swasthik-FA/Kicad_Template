# ============================================================================
# Stage 4 — Pull request into `main` (release candidate)
# ----------------------------------------------------------------------------
# Same gate + full output group as Stage 3. After this PR merges, a
# maintainer tags the merge with `vX.Y.Z` to trigger Stage 5 (release).
#
# REQUIRED branch protection on `main`: required check name "Release-candidate build".
# ============================================================================
name: PR to main — release candidate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

env:
  KICAD_PROJECT_DIR: hardware
  KICAD_PROJECT: Nano-Board-rev-2
  KIBOT_CONFIG: config/kibot/kibot_main.yaml
  KIBOT_LOG: kibot_run.log

jobs:
  rc-build:
    name: Release-candidate build
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/inti-cmnb/kicad_auto:ki9
      options: --user root

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare reports directory
        run: mkdir -p output/reports

      - name: ERC via kicad-cli
        run: |
          set +e
          SCH="${KICAD_PROJECT_DIR}/${KICAD_PROJECT}.kicad_sch"
          kicad-cli sch erc -f json -o output/reports/erc.json "${SCH}"
          kicad-cli sch erc        -o output/reports/erc.rpt  "${SCH}" || true

      - name: DRC via kicad-cli
        run: |
          set +e
          PCB="${KICAD_PROJECT_DIR}/${KICAD_PROJECT}.kicad_pcb"
          kicad-cli pcb drc -f json --schematic-parity -o output/reports/drc.json "${PCB}"
          kicad-cli pcb drc        --schematic-parity -o output/reports/drc.rpt  "${PCB}" || true

      - name: Count violations
        id: count
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          def tally(p):
              try: j = json.load(open(p))
              except Exception: return 0,0
              e=w=0
              for sh in j.get('sheets',[j]):
                  for v in sh.get('violations',[]) or []:
                      s=(v.get('severity') or '').lower()
                      e += s=='error'; w += s=='warning'
              for s2 in ('unconnected_items','schematic_parity'):
                  for v in j.get(s2,[]) or []:
                      s=(v.get('severity') or '').lower()
                      e += s=='error'; w += s=='warning'
              return e,w
          ee,ew = tally('output/reports/erc.json')
          de,dw = tally('output/reports/drc.json')
          print(f"erc_errors={ee}")
          print(f"erc_warnings={ew}")
          print(f"drc_errors={de}")
          print(f"drc_warnings={dw}")
          print(f"total_errors={ee+de}")
          PY

      - name: Generate error report HTML
        if: always()
        run: |
          python3 config/generate_error_report.py \
            --erc-json output/reports/erc.json \
            --drc-json output/reports/drc.json \
            --erc-rpt  output/reports/erc.rpt \
            --drc-rpt  output/reports/drc.rpt \
            --output   output/error-report.html

      - name: Upload error report (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: error-report
          path: output/error-report.html
          retention-days: 30
          if-no-files-found: warn

      - name: KiBot — full group (only if gate passes)
        if: steps.count.outputs.total_errors == '0'
        run: |
          set +e
          kibot \
            -c "${KIBOT_CONFIG}" \
            -d output \
            -e "${KICAD_PROJECT_DIR}/${KICAD_PROJECT}.kicad_sch" \
            -b "${KICAD_PROJECT_DIR}/${KICAD_PROJECT}.kicad_pcb" \
            --skip-pre erc,drc \
            --log "${KIBOT_LOG}" \
            full

      - name: Upload release-candidate package (only if gate passes)
        if: steps.count.outputs.total_errors == '0'
        uses: actions/upload-artifact@v4
        with:
          name: release-candidate-${{ github.event.pull_request.number }}
          path: |
            output/
            ${{ env.KIBOT_LOG }}
          retention-days: 90
          if-no-files-found: warn

      - name: Comment on PR (on failure)
        if: steps.count.outputs.total_errors != '0'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ❌ **Release-candidate build failed (ERC / DRC).**

            ERC: **${{ steps.count.outputs.erc_errors }}** error(s) / ${{ steps.count.outputs.erc_warnings }} warning(s)
            DRC: **${{ steps.count.outputs.drc_errors }}** error(s) / ${{ steps.count.outputs.drc_warnings }} warning(s)

            See the [`error-report` artifact ↗](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

      - name: Fail job if ERC/DRC errors
        if: steps.count.outputs.total_errors != '0'
        run: |
          echo "::error::ERC/DRC failed on qa→main promotion."
          exit 1
