# ============================================================================
# Build artifacts on every push to main
# ----------------------------------------------------------------------------
# Trigger:  any push to `main` that touches the design or pipeline.
# Purpose:  regenerate the full output set (ERC/DRC reports, schematic
#           PDF, 3D PNGs + GLB, iBOM, gerbers, drills, navigate page,
#           themed HTML, dedicated 3D viewer page) and commit the
#           refreshed HTML/ tree back as a `[skip ci]` commit. Never
#           fails the workflow on ERC/DRC severity — informational only
#           for solo work on main.
# Outputs:
#   - HTML/                   committed back into the repo (Pages source)
#   - error-report.html       inside HTML/
#   - schematic PDF, 4 × 3D PNG renders, GLB, interactive HTML BOM
# ============================================================================
name: Build artifacts on main

on:
  push:
    branches: [main]
    paths:
      - 'hardware/**'
      - 'config/**'
      - 'scripts/**'
      - '.github/workflows/feature-push.yml'
  workflow_dispatch:

env:
  KICAD_PROJECT_DIR: hardware
  KICAD_PROJECT: Nano-Board-rev-2
  KIBOT_CONFIG: config/kibot/kibot_main.yaml
  KIBOT_LOG: kibot_run.log

permissions:
  contents: write

jobs:
  visual:
    name: Visual preview (no gating)
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/inti-cmnb/kicad_auto:ki9
      options: --user root

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare reports directory
        run: mkdir -p output/reports

      # ----------------------------------------------------------------------
      # KiBot — full group. Runs ERC + DRC preflights (which honor the
      # project's rule_severities, unlike `kicad-cli`) plus all visual and
      # manufacturing outputs. Preflights write erc-erc.{html,rpt,json} and
      # drc-drc.{html,rpt,json} into output/reports/ for the count step
      # below. dont_stop=true on the DRC preflight keeps KiBot going past
      # violations; `continue-on-error: true` plus `set +e` keep the
      # workflow green regardless on feature branches.
      # ----------------------------------------------------------------------
      - name: Detect PCB presence
        id: detect
        run: |
          if [ -f "${KICAD_PROJECT_DIR}/${KICAD_PROJECT}.kicad_pcb" ]; then
            echo "has_pcb=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_pcb=false" >> "$GITHUB_OUTPUT"
            echo "No PCB file found — running schematic-only KiBot group."
          fi

      - name: KiBot — full group (preflights + outputs)
        id: kibot
        if: steps.detect.outputs.has_pcb == 'true'
        continue-on-error: true
        run: |
          set +e
          kibot \
            -c "${KIBOT_CONFIG}" \
            -d output \
            -e "${KICAD_PROJECT_DIR}/${KICAD_PROJECT}.kicad_sch" \
            -b "${KICAD_PROJECT_DIR}/${KICAD_PROJECT}.kicad_pcb" \
            --log "${KIBOT_LOG}" \
            full

      - name: KiBot — schematic-only group (no PCB)
        id: kibot_sch
        if: steps.detect.outputs.has_pcb == 'false'
        continue-on-error: true
        run: |
          set +e
          kibot \
            -c "${KIBOT_CONFIG}" \
            -d output \
            -e "${KICAD_PROJECT_DIR}/${KICAD_PROJECT}.kicad_sch" \
            --skip-pre drc \
            --log "${KIBOT_LOG}" \
            schematic_only

      # ----------------------------------------------------------------------
      # Build a browser-ready GLB so the navigate_3d page can show the
      # board interactively via <model-viewer>. The conversion script is
      # a thin wrapper around `kicad-cli pcb export glb`. Output lands at
      # HTML/3d/<project>.glb but we mirror it under output/3d/ first so
      # the publish step's `cp -rf output/. HTML/` picks it up alongside
      # everything else.
      # ----------------------------------------------------------------------
      - name: Convert PCB to GLB for in-browser 3D viewer
        if: steps.detect.outputs.has_pcb == 'true'
        continue-on-error: true
        run: |
          set +e
          mkdir -p output/3d
          python3 scripts/convert_to_glb.py \
            --pcb "${KICAD_PROJECT_DIR}/${KICAD_PROJECT}.kicad_pcb" \
            --output "output/3d/${KICAD_PROJECT}.glb" || true
          ls -la output/3d/ || true

      # ----------------------------------------------------------------------
      # Count violations — purely informational. Drives a friendly summary,
      # NOT a merge gate. The job never exits non-zero based on this.
      # ----------------------------------------------------------------------
      - name: Count violations (informational)
        id: count
        if: always()
        continue-on-error: true
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          def tally(p):
              try: j = json.load(open(p))
              except Exception: return 0,0
              e=w=0
              for sh in j.get('sheets',[j]):
                  for v in sh.get('violations',[]) or []:
                      s=(v.get('severity') or '').lower()
                      e += s=='error'; w += s=='warning'
              for s2 in ('unconnected_items','schematic_parity'):
                  for v in j.get(s2,[]) or []:
                      s=(v.get('severity') or '').lower()
                      e += s=='error'; w += s=='warning'
              return e,w
          ee,ew = tally('output/reports/erc-erc.json')
          de,dw = tally('output/reports/drc-drc.json')
          print(f"erc_errors={ee}")
          print(f"erc_warnings={ew}")
          print(f"drc_errors={de}")
          print(f"drc_warnings={dw}")
          PY

      - name: Generate error report HTML (always)
        if: always()
        continue-on-error: true
        run: |
          python3 config/generate_error_report.py \
            --erc-json output/reports/erc-erc.json \
            --drc-json output/reports/drc-drc.json \
            --erc-rpt  output/reports/erc-erc.rpt \
            --drc-rpt  output/reports/drc-drc.rpt \
            --output   output/error-report.html || true

      # ----------------------------------------------------------------------
      # Friendly job-summary block — visible on the run page without
      # downloading anything. Pure information, never blocks.
      # ----------------------------------------------------------------------
      - name: Job summary
        if: always()
        continue-on-error: true
        run: |
          {
            echo "## Feature push — visual preview"
            echo ""
            echo "| Check | Errors | Warnings |"
            echo "|-------|--------|----------|"
            echo "| ERC   | ${{ steps.count.outputs.erc_errors }} | ${{ steps.count.outputs.erc_warnings }} |"
            echo "| DRC   | ${{ steps.count.outputs.drc_errors }} | ${{ steps.count.outputs.drc_warnings }} |"
            echo ""
            echo "ERC/DRC are **informational only** on feature branches. They block merges only at the PR-to-dev stage."
            echo ""
            echo "### Output tree"
            echo '```'
            [ -d output ] && find output -maxdepth 4 | sort || echo "(no output)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # ----------------------------------------------------------------------
      # Schematic-only mode: KiBot doesn't emit a navigate page, so write
      # a small landing page linking to the schematic PDF, ERC report and
      # CSV BOM. Mirrored into HTML/ by the publish step below.
      # ----------------------------------------------------------------------
      - name: Build schematic-only landing page
        if: steps.detect.outputs.has_pcb == 'false'
        continue-on-error: true
        run: |
          mkdir -p output/reports
          python3 config/generate_error_report.py \
            --erc-json output/reports/erc-erc.json \
            --erc-rpt  output/reports/erc-erc.rpt \
            --output   output/reports/erc-erc.html || true

          PROJECT="${KICAD_PROJECT}"
          cat > output/index.html <<HTML
          <!DOCTYPE html>
          <html><head><meta charset="utf-8"/>
          <title>${PROJECT} — schematic-only project</title>
          <style>
            body{font-family:system-ui,sans-serif;background:#0f1320;color:#e6e9f2;
                 max-width:720px;margin:4rem auto;padding:0 1.25rem;}
            h1{font-size:1.5rem;margin-bottom:.25rem;}
            p.sub{color:#94a0b8;margin-top:0;}
            ul{list-style:none;padding:0;margin-top:2rem;}
            li{margin:.75rem 0;}
            a{display:block;padding:1rem 1.25rem;background:#1a2236;
              border:1px solid rgba(255,255,255,.08);border-radius:12px;
              color:#a5b4fc;text-decoration:none;font-weight:600;
              transition:border-color .2s,transform .2s;}
            a:hover{border-color:#818cf8;transform:translateY(-2px);}
            a small{display:block;color:#94a0b8;font-weight:400;font-size:.85rem;
                    margin-top:.25rem;}
          </style></head><body>
          <h1>${PROJECT}</h1>
          <p class="sub">Schematic-only project. PCB outputs are not generated.</p>
          <ul>
            <li><a href="schematic/${PROJECT}-schematic.pdf">Schematic (PDF)
                <small>Rendered from the KiCad schematic</small></a></li>
            <li><a href="reports/erc-erc.html">ERC report
                <small>Electrical rule check results</small></a></li>
            <li><a href="bom/${PROJECT}-bom.csv">Bill of Materials (CSV)
                <small>Component list exported from the schematic</small></a></li>
          </ul>
          </body></html>
          HTML
          echo "wrote output/index.html"

      # ----------------------------------------------------------------------
      # Publish rendered PNGs and refresh repo-name placeholder in README.
      # The README has marker comments <!--REPO_NAME-->...<!--/REPO_NAME-->;
      # we always rewrite the content between them with the live GitHub repo
      # name so the title tracks renames automatically.
      # Pushes made by GITHUB_TOKEN do not re-trigger workflows, so no loop.
      # ----------------------------------------------------------------------
      - name: Publish renders and refresh README repo name
        if: always()
        continue-on-error: true
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set +e
          # The navigate_results page links to erc-erc.{html,rpt,json} and
          # drc-drc.{html,rpt,json}. KiBot's preflight already wrote the
          # .rpt/.json with those exact names, so we just regenerate the
          # custom-styled HTML pages on top.
          mkdir -p output/reports
          # ERC-only page
          python3 config/generate_error_report.py \
            --erc-json output/reports/erc-erc.json \
            --erc-rpt  output/reports/erc-erc.rpt \
            --output   output/reports/erc-erc.html || true
          # DRC-only page
          python3 config/generate_error_report.py \
            --drc-json output/reports/drc-drc.json \
            --drc-rpt  output/reports/drc-drc.rpt \
            --output   output/reports/drc-drc.html || true

          # Strip the .rpt and .json tiles from KiBot's navigate_reports.html
          # so the navigate page only links to the HTML reports. The .rpt /
          # .json files still ship in HTML/reports/ and are linked as
          # downloads from inside erc-erc.html and drc-drc.html.
          python3 - <<'PY' || true
          import re, pathlib
          for nav in pathlib.Path("output").rglob("*-navigate_reports.html"):
              s = nav.read_text(encoding="utf-8")
              new = re.sub(
                  r'\s*<div class="output-box[^"]*"\s+onclick="[^"]*\.(?:rpt|json)\'"[^>]*>[\s\S]*?</div>',
                  "",
                  s,
              )
              if new != s:
                  nav.write_text(new, encoding="utf-8")
                  print(f"stripped rpt/json tiles from {nav}")
          PY

          # Build a dedicated full-page 3D viewer at output/3d-viewer.html
          # (so the GitHub Pages URL https://<owner>.github.io/<repo>/3d-viewer.html
          # opens directly into the viewer), and inject a styled "Open
          # Interactive 3D Viewer" button into the navigate_3d page that
          # opens that URL in a new tab. The button replaces what used
          # to be an inline <model-viewer> embed (which couldn't load
          # over file://). Also replaces the auto-generated .step tile
          # with a "Download STEP" button.
          python3 - <<'PY' || true
          import os, pathlib, re, html
          project = os.environ.get("KICAD_PROJECT", "")
          repo = os.environ.get("GITHUB_REPOSITORY", "")  # "owner/repo"
          owner, repo_name = (repo.split("/", 1) + [""])[:2] if repo else ("", "")
          # GitHub Pages URLs use lowercase owner.
          pages_origin = f"https://{owner.lower()}.github.io/{repo_name}" if owner and repo_name else ""
          viewer_url   = f"{pages_origin}/3d-viewer.html" if pages_origin else "../3d-viewer.html"

          glb_rel = f"../3d/{project}.glb"
          step_rel = f"../3d/{project}.step"

          # 0. Render config/web/3d-viewer.html template -> output/3d-viewer.html
          tpl = pathlib.Path("config/web/3d-viewer.html")
          if tpl.exists():
              t = tpl.read_text(encoding="utf-8")
              # The viewer page lives at HTML root; the GLB is at HTML/3d/.
              t = (t.replace("{{TITLE}}", html.escape(project))
                    .replace("{{GLB_URL}}", f"3d/{project}.glb"))
              out = pathlib.Path("output/3d-viewer.html")
              out.write_text(t, encoding="utf-8")
              print(f"wrote {out}")
          # Rename the landing-page "3d" category tile to "3D Viewer"
          # so the entry point is labeled clearly. The tile's link
          # already targets navigate_3d.html, which on GitHub Pages
          # serves the live <model-viewer>.
          for landing in pathlib.Path("output").rglob("*-navigate.html"):
              t = landing.read_text(encoding="utf-8")
              t2 = re.sub(
                  r'(category-title">)3d(</p>)',
                  r'\g<1>3D Viewer\g<2>',
                  t, count=1,
              )
              if t2 != t:
                  landing.write_text(t2, encoding="utf-8")
                  print(f"renamed 3d tile -> 3D Viewer in {landing}")

          # Sidebar cleanup. KiBot's auto-generated left menu lists every
          # output by its raw KiBot name (png_3d_top, png_3d_bottom,
          # png_3d_angled_top, png_3d_angled_bottom, step). Collapse all
          # of that into a single "3D Viewer" entry that opens the
          # dedicated viewer page in a new tab. Applied to EVERY navigate
          # page since they all share the same sidebar markup.
          sidebar_re = re.compile(
              r"(folder-[a-z0-9-]*-navigate-3d[^>]*>\s*)"
              r"<ul class='navbar-category'>[\s\S]*?</ul>",
              re.M,
          )
          new_3d_items = (
              "<ul class='navbar-category'>\n"
              f"   <li><a href='{html.escape(viewer_url)}' "
              "target='_blank' rel='noopener noreferrer' "
              "class='navbar-output'>3D Viewer</a></li>\n"
              " </ul>"
          )
          for nav_any in pathlib.Path("output").rglob("*-navigate*.html"):
              t = nav_any.read_text(encoding="utf-8")
              t2 = sidebar_re.sub(
                  lambda m: m.group(1) + new_3d_items, t, count=1
              )
              # Also rename the parent folder label "3d" -> "3D Viewer".
              t2 = re.sub(
                  r"(<span class='chevron'></span>\s*)3d(\s*</span>)",
                  r"\g<1>3D Viewer\g<2>",
                  t2,
                  count=1,
              )
              if t2 != t:
                  nav_any.write_text(t2, encoding="utf-8")
                  print(f"sidebar cleaned in {nav_any}")

          # The interactive viewer goes only on the dedicated 3D page.
          for nav in pathlib.Path("output").rglob("*-navigate_3d.html"):
              s = nav.read_text(encoding="utf-8")

              # 1. Inject a "Open Interactive 3D Viewer" button at the
              # top of the 3D page. Idempotent (skip if already there).
              if "open-3d-viewer" not in s:
                  cube = (
                      '<svg viewBox="0 0 24 24" width="22" height="22" '
                      'fill="none" stroke="currentColor" stroke-width="1.7" '
                      'stroke-linecap="round" stroke-linejoin="round" '
                      'aria-hidden="true">'
                      '<path d="m21 16-9 5-9-5V8l9-5 9 5v8z"/>'
                      '<path d="M3.3 7.5 12 12.5l8.7-5"/>'
                      '<path d="M12 22V12.5"/>'
                      '</svg>'
                  )
                  arrow = (
                      '<svg viewBox="0 0 24 24" width="16" height="16" '
                      'fill="none" stroke="currentColor" stroke-width="2" '
                      'stroke-linecap="round" stroke-linejoin="round" '
                      'aria-hidden="true" style="margin-left:6px;">'
                      '<path d="M7 17 17 7"/>'
                      '<path d="M8 7h9v9"/>'
                      '</svg>'
                  )
                  viewer_block = (
                      '<div class="output-virtual-box" id="open-3d-viewer">\n'
                      '<div class="output-comment">3D Viewer</div>\n'
                      '<div class="items-container" '
                      'style="grid-template-columns: 1fr; place-items: center;">\n'
                      f'<a href="{html.escape(viewer_url)}" target="_blank" '
                      'rel="noopener noreferrer" '
                      'style="grid-column:1/-1;display:flex;flex-direction:column;'
                      'align-items:center;justify-content:center;gap:18px;'
                      'padding:48px 32px;width:100%;'
                      'background:linear-gradient(135deg,'
                      'rgba(99,102,241,0.10) 0%, rgba(22,28,45,0.55) 60%);'
                      'border:1px solid rgba(255,255,255,0.10);'
                      'border-radius:18px;text-decoration:none;color:#E6E9F2;'
                      'transition:transform .25s, border-color .25s, box-shadow .25s;" '
                      'onmouseover="this.style.transform=&quot;translateY(-4px)&quot;;'
                      'this.style.borderColor=&quot;#818CF8&quot;;'
                      'this.style.boxShadow=&quot;0 20px 40px -12px rgba(99,102,241,.45)&quot;;" '
                      'onmouseout="this.style.transform=&quot;translateY(0)&quot;;'
                      'this.style.borderColor=&quot;rgba(255,255,255,0.10)&quot;;'
                      'this.style.boxShadow=&quot;none&quot;;">'
                      '<div style="display:flex;align-items:center;justify-content:center;'
                      'width:72px;height:72px;border-radius:18px;'
                      'background:linear-gradient(135deg,#6366F1,#A78BFA);'
                      'color:#fff;box-shadow:0 8px 24px rgba(99,102,241,.40);">'
                      f'{cube}'
                      '</div>'
                      '<div style="text-align:center;">'
                      '<div style="font-size:1.05rem;font-weight:700;'
                      'letter-spacing:-0.01em;margin-bottom:4px;">'
                      'Open Interactive 3D Viewer'
                      '</div>'
                      '<div style="font-size:13px;color:#94A0B8;line-height:1.5;'
                      'max-width:420px;">'
                      'Rotate, zoom, and pan the live PCB model. Opens in a '
                      'new tab on GitHub Pages.'
                      '</div>'
                      '</div>'
                      '<div style="display:inline-flex;align-items:center;'
                      'padding:10px 18px;border-radius:999px;'
                      'background:rgba(99,102,241,.18);color:#A5B4FC;'
                      'font-size:13px;font-weight:600;letter-spacing:.01em;">'
                      'Launch viewer'
                      f'{arrow}'
                      '</div>'
                      '</a>\n'
                      '</div>\n'
                      '</div>\n'
                  )
                  s = s.replace('<div id="main">',
                                '<div id="main">\n' + viewer_block, 1)

              # 2. Replace the auto-generated .step tile with a clean
              # "Download STEP" button.
              step_block_re = re.compile(
                  r'<div class="output-virtual-box" id="step">[\s\S]*?</div>\s*</div>',
                  re.M,
              )
              new_step = (
                  '<div class="output-virtual-box" id="step">\n'
                  '<div class="output-comment">Download STEP</div>\n'
                  '<div class="items-container">\n'
                  f'<a class="output-box step-download" href="{step_rel}" '
                  f'download="{project}.step" '
                  'style="text-decoration:none;cursor:pointer;">'
                  '<svg width="56" height="56" viewBox="0 0 24 24" fill="none" '
                  'stroke="currentColor" stroke-width="1.6" stroke-linecap="round" '
                  'stroke-linejoin="round" style="margin:8px 0 14px;color:#60A5FA;">'
                  '<path d="M12 3v12"/>'
                  '<path d="m7 10 5 5 5-5"/>'
                  '<path d="M5 21h14"/>'
                  '</svg>'
                  f'<p class="filename">{project}.step</p>'
                  '<p class="output-name">Click to download</p>'
                  '</a>\n'
                  '</div>\n'
                  '</div>'
              )
              s2, n = step_block_re.subn(new_step, s, count=1)
              if n:
                  s = s2

              nav.write_text(s, encoding="utf-8")
              print(f"patched {nav}")
          PY

          # Override KiBot's auto-generated styles.css with our themed
          # version (config/web/styles.css). Same class names, modernized
          # look. Done before mirroring so the copy lands in HTML/HTML/.
          if [ -f config/web/styles.css ]; then
              for css in $(find output -name styles.css); do
                  cp -f config/web/styles.css "$css"
                  echo "themed $css"
              done
          fi

          # Mirror the entire KiBot output tree under HTML/ so the
          # navigate_results webpage's relative links (../3d/, ../reports/,
          # ../schematic/, ../ibom/, …) resolve correctly when browsed
          # from the repo. Wipe HTML/ first to avoid stale files.
          mkdir -p HTML
          find HTML -mindepth 1 ! -name '.gitkeep' -exec rm -rf {} + 2>/dev/null
          if [ -d output ]; then
            cp -rf output/. HTML/
          fi
          [ -f output/error-report.html ] && cp -f output/error-report.html HTML/error-report.html

          # Rewrite the repo-name placeholder in README.md, idempotently.
          if [ -f README.md ]; then
            python3 - <<PY
          import os, re, pathlib
          p = pathlib.Path("README.md")
          s = p.read_text(encoding="utf-8")
          name = os.environ["REPO_NAME"]
          new = re.sub(
              r"<!--REPO_NAME-->.*?<!--/REPO_NAME-->",
              f"<!--REPO_NAME-->{name}<!--/REPO_NAME-->",
              s, flags=re.S,
          )
          if new != s:
              p.write_text(new, encoding="utf-8")
              print(f"README.md: repo name set to {name}")
          else:
              print("README.md: repo name already current")
          PY
          fi

          # Make git happy inside the container
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add HTML README.md
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git commit -m "ci: refresh 3D PCB renders and README repo name [skip ci]"

          # Push, with pull-rebase retry to handle the race where another
          # workflow run (or a manual push) committed to main while we
          # were generating artifacts. The auto-commit only changes
          # HTML/ and README.md — both safe to rebase.
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              echo "Push succeeded on attempt ${attempt}."
              exit 0
            fi
            echo "Push rejected on attempt ${attempt}; pulling --rebase and retrying."
            git fetch origin "${GITHUB_REF_NAME}"
            # rebase onto the latest tip; if there's a conflict in HTML/
            # we prefer ours (the freshly regenerated tree).
            git -c rerere.enabled=false rebase \
                --strategy=recursive --strategy-option=ours \
                "origin/${GITHUB_REF_NAME}" || git rebase --abort || true
          done
          echo "ERROR: failed to push refreshed HTML/ after 5 attempts."
          exit 1

      - name: Upload visual preview artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: visual-preview-${{ github.run_number }}-${{ github.sha }}
          path: |
            output/
            ${{ env.KIBOT_LOG }}
          retention-days: 14
          if-no-files-found: warn

      # ----------------------------------------------------------------------
      # Final step — explicit success. Stage 1 is informational only and
      # must NEVER mark the run red, no matter what happened upstream.
      # ----------------------------------------------------------------------
      - name: Always succeed
        if: always()
        run: |
          echo "Stage 1 (feature push) is informational only — run finishes green regardless of ERC/DRC/render results."
          exit 0
