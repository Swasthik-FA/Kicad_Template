# ============================================================================
# Build artifacts on every push to main
# ----------------------------------------------------------------------------
# Trigger:  any push to `main` that touches the design or pipeline.
# Purpose:  regenerate the full output set (ERC/DRC reports, schematic
#           PDF, 3D PNGs + GLB, iBOM, gerbers, drills, navigate page,
#           themed HTML, Three.js 3D viewer page) and commit the
#           refreshed HTML/ tree back as a `[skip ci]` commit. Never
#           fails the workflow on ERC/DRC severity — informational only
#           for solo work on main.
# Outputs:
#   - HTML/                   committed back into the repo (Pages source)
#   - error-report.html       inside HTML/
#   - schematic PDF, 4 × 3D PNG renders, GLB, interactive HTML BOM
# ============================================================================
name: Build artifacts on main

on:
  push:
    branches:
      - 'feature/**'
    paths:
      - 'hardware/**'
      - 'config/**'
      - 'scripts/**'
      - '.github/workflows/feature-push.yml'
  workflow_dispatch:

env:
  KICAD_PROJECT_DIR: hardware
  KICAD_PROJECT: Nano-Board-rev-2
  KIBOT_CONFIG: config/kibot/kibot_main.yaml
  KIBOT_LOG: kibot_run.log

permissions:
  contents: write

jobs:
  visual:
    name: Visual preview (no gating)
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/inti-cmnb/kicad_auto:ki9
      options: --user root

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare reports directory
        run: mkdir -p output/reports

      # ----------------------------------------------------------------------
      # KiBot — full group. Runs ERC + DRC preflights (which honor the
      # project's rule_severities, unlike `kicad-cli`) plus all visual and
      # manufacturing outputs. Preflights write erc-erc.{html,rpt,json} and
      # drc-drc.{html,rpt,json} into output/reports/ for the count step
      # below. dont_stop=true on the DRC preflight keeps KiBot going past
      # violations; `continue-on-error: true` plus `set +e` keep the
      # workflow green regardless on feature branches.
      # ----------------------------------------------------------------------
      - name: Detect PCB presence
        id: detect
        run: |
          PCB="${KICAD_PROJECT_DIR}/${KICAD_PROJECT}.kicad_pcb"
          if [ -f "$PCB" ] && grep -q "(segment\|(footprint\|(gr_line" "$PCB" 2>/dev/null; then
            echo "has_pcb=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_pcb=false" >> "$GITHUB_OUTPUT"
            echo "No usable PCB file — running schematic-only KiBot group."
          fi

      - name: KiBot — full group (preflights + outputs)
        id: kibot
        if: steps.detect.outputs.has_pcb == 'true'
        continue-on-error: true
        run: |
          set +e
          kibot \
            -c "${KIBOT_CONFIG}" \
            -d output \
            -e "${KICAD_PROJECT_DIR}/${KICAD_PROJECT}.kicad_sch" \
            -b "${KICAD_PROJECT_DIR}/${KICAD_PROJECT}.kicad_pcb" \
            --log "${KIBOT_LOG}" \
            full

      - name: KiBot — schematic-only group (no PCB)
        id: kibot_sch
        if: steps.detect.outputs.has_pcb == 'false'
        continue-on-error: true
        run: |
          set +e
          kibot \
            -c "${KIBOT_CONFIG}" \
            -d output \
            -e "${KICAD_PROJECT_DIR}/${KICAD_PROJECT}.kicad_sch" \
            --skip-pre drc \
            --log "${KIBOT_LOG}" \
            schematic_only

      # ----------------------------------------------------------------------
      # GLB export for the Three.js 3D viewer (config/web/3d-viewer.html).
      # Wraps `kicad-cli pcb export glb`. Output lands at output/3d/<project>.glb;
      # mirrored into HTML/3d/ by the publish step below.
      # ----------------------------------------------------------------------
      - name: Convert PCB to GLB
        if: steps.detect.outputs.has_pcb == 'true'
        continue-on-error: true
        run: |
          set +e
          mkdir -p output/3d
          python3 scripts/convert_to_glb.py \
            --pcb "${KICAD_PROJECT_DIR}/${KICAD_PROJECT}.kicad_pcb" \
            --output "output/3d/${KICAD_PROJECT}.glb" || true
          ls -la output/3d/ || true

      # ----------------------------------------------------------------------
      # Compress with gltf-transform. We deliberately AVOID the `optimize`
      # preset: it runs `join`, `palette`, `flatten`, and `weld` which merge
      # meshes that share (or appear to share) materials. KiCad's GLB exports
      # the soldermask, copper, silkscreen, FR4 body and components as
      # separate meshes with PBR materials -- joining/paletting them collapses
      # the board into a flat single-material blob. Run only the lossless,
      # non-merging passes plus meshopt + webp.
      # ----------------------------------------------------------------------
      - name: Compress GLB (gltf-transform, layer-preserving)
        if: steps.detect.outputs.has_pcb == 'true'
        continue-on-error: true
        run: |
          set -e
          GLB="output/3d/${KICAD_PROJECT}.glb"
          [ -f "$GLB" ] || { echo "no GLB to compress"; exit 0; }
          ORIG=$(stat -c%s "$GLB")
          TMP="$GLB.tmp.glb"
          cp "$GLB" "$TMP"
          run_gt () {
            npx --yes @gltf-transform/cli@4 "$@" "$TMP" "$TMP.out" && mv "$TMP.out" "$TMP"
          }
          # Order matters: dedup/prune first, then meshopt, then texture compress.
          run_gt dedup    || { echo "dedup failed; keeping original"; exit 0; }
          run_gt prune    || { echo "prune failed; keeping previous"; }
          run_gt meshopt  || { echo "meshopt failed; keeping previous"; }
          mv "$TMP" "$GLB"
          NEW=$(stat -c%s "$GLB")
          echo "GLB compressed: ${ORIG} -> ${NEW} bytes ($(( 100 - NEW * 100 / ORIG ))% smaller)"

      # ----------------------------------------------------------------------
      # Count violations — purely informational. Drives a friendly summary,
      # NOT a merge gate. The job never exits non-zero based on this.
      # ----------------------------------------------------------------------
      - name: Count violations (informational)
        id: count
        if: always()
        continue-on-error: true
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          def tally(p):
              try: j = json.load(open(p))
              except Exception: return 0,0
              e=w=0
              for sh in j.get('sheets',[j]):
                  for v in sh.get('violations',[]) or []:
                      s=(v.get('severity') or '').lower()
                      e += s=='error'; w += s=='warning'
              for s2 in ('unconnected_items','schematic_parity'):
                  for v in j.get(s2,[]) or []:
                      s=(v.get('severity') or '').lower()
                      e += s=='error'; w += s=='warning'
              return e,w
          ee,ew = tally('output/reports/erc-erc.json')
          de,dw = tally('output/reports/drc-drc.json')
          print(f"erc_errors={ee}")
          print(f"erc_warnings={ew}")
          print(f"drc_errors={de}")
          print(f"drc_warnings={dw}")
          PY

      - name: Generate error report HTML (always)
        if: always()
        continue-on-error: true
        run: |
          python3 config/generate_error_report.py \
            --erc-json output/reports/erc-erc.json \
            --drc-json output/reports/drc-drc.json \
            --erc-rpt  output/reports/erc-erc.rpt \
            --drc-rpt  output/reports/drc-drc.rpt \
            --output   output/error-report.html || true

      # ----------------------------------------------------------------------
      # Friendly job-summary block — visible on the run page without
      # downloading anything. Pure information, never blocks.
      # ----------------------------------------------------------------------
      - name: Job summary
        if: always()
        continue-on-error: true
        run: |
          {
            echo "## Feature push — visual preview"
            echo ""
            echo "| Check | Errors | Warnings |"
            echo "|-------|--------|----------|"
            echo "| ERC   | ${{ steps.count.outputs.erc_errors }} | ${{ steps.count.outputs.erc_warnings }} |"
            echo "| DRC   | ${{ steps.count.outputs.drc_errors }} | ${{ steps.count.outputs.drc_warnings }} |"
            echo ""
            echo "ERC/DRC are **informational only** on feature branches. They block merges only at the PR-to-dev stage."
            echo ""
            echo "### Output tree"
            echo '```'
            [ -d output ] && find output -maxdepth 4 | sort || echo "(no output)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # ----------------------------------------------------------------------
      # Build a dynamic landing page (output/index.html) and prune empty
      # category tiles from KiBot's navigate page based on which artifacts
      # actually got produced. Two sections (Schematic / PCB); each is
      # hidden entirely if no artifact in that family exists.
      # ----------------------------------------------------------------------
      - name: Build dynamic landing + prune navigate tiles
        if: always()
        continue-on-error: true
        env:
          PROJECT: ${{ env.KICAD_PROJECT }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json, os, pathlib, re, html
          out = pathlib.Path("output")
          project = os.environ.get("PROJECT", "")
          repo = os.environ.get("REPO", "")
          owner, repo_name = (repo.split("/", 1) + [""])[:2] if repo else ("", "")
          pages_origin = f"https://{owner.lower()}.github.io/{repo_name}" if owner and repo_name else ""
          viewer_url = f"{pages_origin}/3d-viewer.html" if pages_origin else "3d-viewer.html"

          def first(glob):
              hits = sorted(out.glob(glob))
              return hits[0].relative_to(out).as_posix() if hits else None

          def any_match(glob):
              return any(out.glob(glob))

          # ----- detect artifacts ------------------------------------------------
          art = {
              "schematic_pdf":  first(f"schematic/{project}-schematic.pdf") or first("schematic/*.pdf"),
              "bom_csv":        first(f"bom/{project}-bom.csv") or first("bom/*-bom.csv"),
              "ibom":           first("bom/*-ibom.html"),
              "erc_html":       first("reports/erc-erc.html"),
              "drc_html":       first("reports/drc-drc.html"),
              "render_top":     first("3d/*3d-top*.png"),
              "render_bottom":  first("3d/*3d-bottom*.png"),
              "render_iso":     first("3d/*3d-angled*.png"),
              "step":           first("3d/*.step"),
              "step_zip":       None,
              "glb":            first("3d/*.glb"),
              "gerbers_zip":    None,
              "navigate":       first(f"HTML/{project}-navigate.html") or first("HTML/*-navigate.html"),
          }
          # Bundle gerbers into a single downloadable zip if any exist.
          import zipfile
          gerbers_dir = out / "gerbers"
          if gerbers_dir.is_dir() and any(gerbers_dir.iterdir()):
              zip_path = out / f"{project}-gerbers.zip"
              with zipfile.ZipFile(zip_path, "w", zipfile.ZIP_DEFLATED) as zf:
                  for f in sorted(gerbers_dir.rglob("*")):
                      if f.is_file():
                          zf.write(f, arcname=f.relative_to(gerbers_dir).as_posix())
              art["gerbers_zip"] = zip_path.relative_to(out).as_posix()
              print(f"bundled gerbers -> {zip_path}")

          # Bundle STEP model into a zip if present.
          if art["step"]:
              step_src = out / art["step"]
              step_zip = out / f"{project}-step.zip"
              with zipfile.ZipFile(step_zip, "w", zipfile.ZIP_DEFLATED) as zf:
                  zf.write(step_src, arcname=step_src.name)
              art["step_zip"] = step_zip.relative_to(out).as_posix()
              print(f"bundled step -> {step_zip}")

          (out / "artifacts.json").write_text(json.dumps(art, indent=2), encoding="utf-8")

          has_sch = any(art[k] for k in ("schematic_pdf","bom_csv","ibom","erc_html"))
          has_pcb = any(art[k] for k in ("render_top","render_bottom","render_iso","step","glb","gerbers_zip","drc_html"))

          # ----- build dynamic index.html ---------------------------------------
          def card(href, title, sub):
              return (f'<a class="card" href="{html.escape(href)}" '
                      f'target="_blank" rel="noopener noreferrer">'
                      f'<div class="t">{html.escape(title)}</div>'
                      f'<div class="s">{html.escape(sub)}</div></a>')

          sch_cards = []
          if art["schematic_pdf"]: sch_cards.append(card(art["schematic_pdf"], "Schematic (PDF)", "Rendered schematic sheets"))
          if art["erc_html"]:      sch_cards.append(card(art["erc_html"],     "ERC report",       "Electrical rule check"))
          if art["bom_csv"]:       sch_cards.append(card(art["bom_csv"],      "BOM (CSV)",        "Bill of materials"))
          if art["ibom"]:          sch_cards.append(card(art["ibom"],         "Interactive BOM",  "Browseable BOM viewer"))

          pcb_cards = []
          if art["glb"]:           pcb_cards.append(card(viewer_url,          "Open Interactive 3D Viewer","Rotate, zoom, pan the live PCB"))
          if art["render_iso"]:    pcb_cards.append(card(art["render_iso"],   "3D render (iso)",  "Angled isometric view"))
          if art["render_top"]:    pcb_cards.append(card(art["render_top"],   "3D render (top)",  "Top view"))
          if art["render_bottom"]: pcb_cards.append(card(art["render_bottom"],"3D render (bottom)","Bottom view"))
          if art["step_zip"]:      pcb_cards.append(card(art["step_zip"],     "STEP model (ZIP)", "Mechanical CAD — download"))
          if art["gerbers_zip"]:   pcb_cards.append(card(art["gerbers_zip"],  "Gerbers (ZIP)",    "Download all manufacturing files"))
          if art["drc_html"]:      pcb_cards.append(card(art["drc_html"],     "DRC report",       "Design rule check"))

          sections = []
          if sch_cards:
              sections.append('<section><h2>Schematic</h2><div class="grid">' + "".join(sch_cards) + '</div></section>')
          if pcb_cards:
              sections.append('<section><h2>PCB</h2><div class="grid">' + "".join(pcb_cards) + '</div></section>')
          if not sections:
              sections.append('<section><p class="empty">No artifacts were generated.</p></section>')

          page = f"""<!DOCTYPE html>
          <html><head><meta charset="utf-8"/>
          <title>{html.escape(project)} — artifacts</title>
          <style>
            :root{{color-scheme:dark}}
            body{{font-family:system-ui,sans-serif;background:#0f1320;color:#e6e9f2;
                  max-width:960px;margin:3rem auto;padding:0 1.25rem;}}
            h1{{font-size:1.6rem;margin:0 0 .25rem;}}
            p.sub{{color:#94a0b8;margin:0 0 2.5rem;}}
            section{{margin-bottom:2.5rem;}}
            section h2{{font-size:1.1rem;color:#a5b4fc;letter-spacing:.04em;
                        text-transform:uppercase;margin:0 0 1rem;}}
            .grid{{display:grid;gap:1rem;
                   grid-template-columns:repeat(auto-fill,minmax(240px,1fr));}}
            .card{{display:block;padding:1.1rem 1.25rem;background:#1a2236;
                   border:1px solid rgba(255,255,255,.08);border-radius:12px;
                   color:inherit;text-decoration:none;
                   transition:border-color .2s,transform .2s,box-shadow .2s;}}
            .card:hover{{border-color:#818cf8;transform:translateY(-2px);
                         box-shadow:0 12px 28px -16px rgba(99,102,241,.6);}}
            .card .t{{font-weight:600;color:#e6e9f2;margin-bottom:.25rem;}}
            .card .s{{font-size:.85rem;color:#94a0b8;}}
            .empty{{color:#94a0b8;}}
          </style></head><body>
          <h1>{html.escape(project)}</h1>
          <p class="sub">CI artifacts. Sections appear only when the matching files were generated.</p>
          {''.join(sections)}
          </body></html>
          """
          (out / "index.html").write_text(page, encoding="utf-8")
          print(f"wrote {out/'index.html'} (schematic={has_sch}, pcb={has_pcb})")

          # ----- prune empty tiles from KiBot navigate page ----------------------
          # Map KiBot category folder -> presence under output/
          cat_present = {
              "schematic": any_match("schematic/*"),
              "bom":       any_match("bom/*"),
              "3d":        any_match("3d/*"),
              "gerbers":   any_match("gerbers/*"),
              "reports":   any_match("reports/*"),
              "assembly":  any_match("assembly/*"),
          }
          tile_re = re.compile(
              r'<div class="category-box"[^>]*onclick="[^"]*?-navigate_(?P<cat>[a-z0-9_]+)\.html\'"[^>]*>[\s\S]*?</div>\s*</div>',
              re.M,
          )
          for nav in pathlib.Path("output").rglob("*-navigate.html"):
              s = nav.read_text(encoding="utf-8")
              def keep(m):
                  cat = m.group("cat")
                  # Map nav subpages to folder presence; "reports" maps to reports.
                  folder = {"3d":"3d","bom":"bom","schematic":"schematic",
                            "gerbers":"gerbers","reports":"reports",
                            "assembly":"assembly"}.get(cat)
                  if folder and not cat_present.get(folder, True):
                      return ""
                  return m.group(0)
              s2 = tile_re.sub(keep, s)
              if s2 != s:
                  nav.write_text(s2, encoding="utf-8")
                  print(f"pruned tiles in {nav}")
          PY

      # ----------------------------------------------------------------------
      # Publish rendered PNGs and refresh repo-name placeholder in README.
      # The README has marker comments <!--REPO_NAME-->...<!--/REPO_NAME-->;
      # we always rewrite the content between them with the live GitHub repo
      # name so the title tracks renames automatically.
      # Pushes made by GITHUB_TOKEN do not re-trigger workflows, so no loop.
      # ----------------------------------------------------------------------
      - name: Publish renders and refresh README repo name
        if: always()
        continue-on-error: true
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set +e
          # The navigate_results page links to erc-erc.{html,rpt,json} and
          # drc-drc.{html,rpt,json}. KiBot's preflight already wrote the
          # .rpt/.json with those exact names, so we just regenerate the
          # custom-styled HTML pages on top.
          mkdir -p output/reports
          # ERC-only page
          python3 config/generate_error_report.py \
            --erc-json output/reports/erc-erc.json \
            --erc-rpt  output/reports/erc-erc.rpt \
            --output   output/reports/erc-erc.html || true
          # DRC-only page
          python3 config/generate_error_report.py \
            --drc-json output/reports/drc-drc.json \
            --drc-rpt  output/reports/drc-drc.rpt \
            --output   output/reports/drc-drc.html || true

          # Strip the .rpt and .json tiles from KiBot's navigate_reports.html
          # so the navigate page only links to the HTML reports. The .rpt /
          # .json files still ship in HTML/reports/ and are linked as
          # downloads from inside erc-erc.html and drc-drc.html.
          python3 - <<'PY' || true
          import re, pathlib
          for nav in pathlib.Path("output").rglob("*-navigate_reports.html"):
              s = nav.read_text(encoding="utf-8")
              new = re.sub(
                  r'\s*<div class="output-box[^"]*"\s+onclick="[^"]*\.(?:rpt|json)\'"[^>]*>[\s\S]*?</div>',
                  "",
                  s,
              )
              if new != s:
                  nav.write_text(new, encoding="utf-8")
                  print(f"stripped rpt/json tiles from {nav}")
          PY

          # Render the Three.js 3D viewer template -> output/3d-viewer.html.
          # The page lives at HTML root; the GLB is at HTML/3d/<project>.glb,
          # so the relative URL is "3d/<project>.glb".
          python3 - <<'PY' || true
          import os, pathlib, html
          project = os.environ.get("KICAD_PROJECT", "")
          tpl = pathlib.Path("config/web/3d-viewer.html")
          glb = pathlib.Path(f"output/3d/{project}.glb")
          if tpl.exists() and glb.exists():
              t = tpl.read_text(encoding="utf-8")
              t = (t.replace("{{TITLE}}",   html.escape(project))
                    .replace("{{GLB_URL}}", f"3d/{project}.glb"))
              outp = pathlib.Path("output/3d-viewer.html")
              outp.write_text(t, encoding="utf-8")
              print(f"wrote {outp}")
          else:
              print(f"skip viewer render (tpl exists={tpl.exists()}, glb exists={glb.exists()})")
          PY

          # Replace the auto-generated .step tile in the navigate_3d page
          # with a clean "Download STEP" button.
          python3 - <<'PY' || true
          import os, pathlib, re
          project = os.environ.get("KICAD_PROJECT", "")
          step_rel = f"../3d/{project}.step"

          for nav in pathlib.Path("output").rglob("*-navigate_3d.html"):
              s = nav.read_text(encoding="utf-8")

              step_block_re = re.compile(
                  r'<div class="output-virtual-box" id="step">[\s\S]*?</div>\s*</div>',
                  re.M,
              )
              new_step = (
                  '<div class="output-virtual-box" id="step">\n'
                  '<div class="output-comment">Download STEP</div>\n'
                  '<div class="items-container">\n'
                  f'<a class="output-box step-download" href="{step_rel}" '
                  f'download="{project}.step" '
                  'style="text-decoration:none;cursor:pointer;">'
                  '<svg width="56" height="56" viewBox="0 0 24 24" fill="none" '
                  'stroke="currentColor" stroke-width="1.6" stroke-linecap="round" '
                  'stroke-linejoin="round" style="margin:8px 0 14px;color:#60A5FA;">'
                  '<path d="M12 3v12"/>'
                  '<path d="m7 10 5 5 5-5"/>'
                  '<path d="M5 21h14"/>'
                  '</svg>'
                  f'<p class="filename">{project}.step</p>'
                  '<p class="output-name">Click to download</p>'
                  '</a>\n'
                  '</div>\n'
                  '</div>'
              )
              s2, n = step_block_re.subn(new_step, s, count=1)
              if n:
                  s = s2

              nav.write_text(s, encoding="utf-8")
              print(f"patched {nav}")
          PY

          # Override KiBot's auto-generated styles.css with our themed
          # version (config/web/styles.css). Same class names, modernized
          # look. Done before mirroring so the copy lands in HTML/HTML/.
          if [ -f config/web/styles.css ]; then
              for css in $(find output -name styles.css); do
                  cp -f config/web/styles.css "$css"
                  echo "themed $css"
              done
          fi

          # Mirror the entire KiBot output tree under HTML/ so the
          # navigate_results webpage's relative links (../3d/, ../reports/,
          # ../schematic/, ../ibom/, …) resolve correctly when browsed
          # from the repo. Wipe HTML/ first to avoid stale files.
          mkdir -p HTML
          find HTML -mindepth 1 ! -name '.gitkeep' -exec rm -rf {} + 2>/dev/null
          if [ -d output ]; then
            cp -rf output/. HTML/
          fi
          [ -f output/error-report.html ] && cp -f output/error-report.html HTML/error-report.html

          # Rewrite the PCB block (photos + dimensions) in README.md based
          # on whether a PCB exists. Schematic-only projects get a short
          # note instead of the renders/specs table.
          HAS_PCB="${{ steps.detect.outputs.has_pcb }}"
          PCB_PATH="${KICAD_PROJECT_DIR}/${KICAD_PROJECT}.kicad_pcb"
          if [ -f README.md ]; then
            HAS_PCB="$HAS_PCB" PCB_PATH="$PCB_PATH" \
            PROJECT="$KICAD_PROJECT" python3 - <<'PY'
          import os, re, pathlib
          has_pcb = os.environ.get("HAS_PCB") == "true"
          project = os.environ["PROJECT"]
          pcb_path = os.environ["PCB_PATH"]

          dim_str = "Unknown"
          if has_pcb:
              try:
                  import pcbnew
                  b = pcbnew.LoadBoard(pcb_path)
                  bbox = b.GetBoardEdgesBoundingBox()
                  w = bbox.GetWidth() / 1e6
                  h = bbox.GetHeight() / 1e6
                  dim_str = f"{w:.2f} x {h:.2f} mm"
              except Exception as e:
                  print(f"dim calc failed: {e}")

          if has_pcb:
              block = (
                  f'<table align="center">\n'
                  f'  <tr>\n'
                  f'    <td align="center">\n'
                  f'      <img alt="Front" src="HTML/3d/{project}-3d-top.png" width="380">\n'
                  f'      <br><sub><b>Front</b></sub>\n'
                  f'    </td>\n'
                  f'    <td align="center">\n'
                  f'      <img alt="Back" src="HTML/3d/{project}-3d-bottom.png" width="380">\n'
                  f'      <br><sub><b>Back</b></sub>\n'
                  f'    </td>\n'
                  f'  </tr>\n'
                  f'</table>\n\n'
                  f'***\n\n'
                  f'## SPECIFICATIONS\n\n'
                  f'| Parameter | Value |\n'
                  f'| --- | --- |\n'
                  f'| Dimensions | {dim_str} |\n'
              )
          else:
              block = ""

          p = pathlib.Path("README.md")
          s = p.read_text(encoding="utf-8")
          new = re.sub(
              r"<!--PCB_BLOCK-->.*?<!--/PCB_BLOCK-->",
              f"<!--PCB_BLOCK-->\n{block}<!--/PCB_BLOCK-->",
              s, flags=re.S,
          )
          if new != s:
              p.write_text(new, encoding="utf-8")
              print(f"README.md: PCB block updated (has_pcb={has_pcb}, dims={dim_str})")
          else:
              print("README.md: PCB block already current")
          PY
          fi

          # Rewrite the repo-name placeholder in README.md, idempotently.
          if [ -f README.md ]; then
            python3 - <<PY
          import os, re, pathlib
          p = pathlib.Path("README.md")
          s = p.read_text(encoding="utf-8")
          name = os.environ["REPO_NAME"]
          new = re.sub(
              r"<!--REPO_NAME-->.*?<!--/REPO_NAME-->",
              f"<!--REPO_NAME-->{name}<!--/REPO_NAME-->",
              s, flags=re.S,
          )
          if new != s:
              p.write_text(new, encoding="utf-8")
              print(f"README.md: repo name set to {name}")
          else:
              print("README.md: repo name already current")
          PY
          fi

          # Make git happy inside the container
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add HTML README.md
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git commit -m "ci: refresh 3D PCB renders and README repo name [skip ci]"

          # Push, with pull-rebase retry to handle the race where another
          # workflow run (or a manual push) committed to main while we
          # were generating artifacts. The auto-commit only changes
          # HTML/ and README.md — both safe to rebase.
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              echo "Push succeeded on attempt ${attempt}."
              exit 0
            fi
            echo "Push rejected on attempt ${attempt}; pulling --rebase and retrying."
            git fetch origin "${GITHUB_REF_NAME}"
            # rebase onto the latest tip; if there's a conflict in HTML/
            # we prefer ours (the freshly regenerated tree).
            git -c rerere.enabled=false rebase \
                --strategy=recursive --strategy-option=ours \
                "origin/${GITHUB_REF_NAME}" || git rebase --abort || true
          done
          echo "ERROR: failed to push refreshed HTML/ after 5 attempts."
          exit 1

      - name: Upload visual preview artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: visual-preview-${{ github.run_number }}-${{ github.sha }}
          path: |
            output/
            ${{ env.KIBOT_LOG }}
          retention-days: 14
          if-no-files-found: warn

      # ----------------------------------------------------------------------
      # Final step — explicit success. Stage 1 is informational only and
      # must NEVER mark the run red, no matter what happened upstream.
      # ----------------------------------------------------------------------
      - name: Always succeed
        if: always()
        run: |
          echo "Stage 1 (feature push) is informational only — run finishes green regardless of ERC/DRC/render results."
          exit 0
