# ============================================================================
# Stage 1 — Feature branch push (FAST, no gating)
# ----------------------------------------------------------------------------
# Trigger:  any push to a `feature/**` branch.
# Purpose:  give the engineer a quick visual export so they can sanity-check
#           the schematic/PCB without being blocked on ERC/DRC.
# Outputs:  uploaded as the `visual-preview` artifact (14-day retention).
# Reminder: ERC / DRC are intentionally NOT run here. Those run at Stage 2
#           when a PR is opened against `dev`.
#
# Resilience: each KiBot output is invoked independently so that one bad
# render (e.g. a flaky kicad-cli sch export) does not stop the rest.
# ============================================================================
name: Feature push — visual preview

on:
  push:
    branches:
      - 'feature/**'

env:
  KICAD_PROJECT_DIR: hardware
  KICAD_PROJECT: Nano-Board-rev-2

jobs:
  visual-preview:
    name: Visual preview (no ERC/DRC)
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/inti-cmnb/kicad8_auto_full:latest
      options: --user root

    # The KiBot container's /bin/sh is dash, which lacks bash arrays etc.
    # Pin every `run:` step to bash so we get a consistent, modern shell.
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------------------------------------------------
      # Diagnostic — call kicad-cli directly so we see its real error message
      # if it fails. KiBot wraps kicad-cli and swallows stderr, which makes
      # debugging painful. This step never fails the workflow.
      # ----------------------------------------------------------------------
      - name: Diagnose — kicad-cli direct invocation
        continue-on-error: true
        run: |
          set +e
          echo "::group::kicad-cli version"
          kicad-cli version || true
          echo "::endgroup::"
          mkdir -p debug-output
          echo "::group::sch export svg (raw, no extra flags)"
          kicad-cli sch export svg \
            --output debug-output \
            "${KICAD_PROJECT_DIR}/${KICAD_PROJECT}.kicad_sch"
          echo "kicad-cli sch export svg exit code: $?"
          echo "::endgroup::"
          echo "::group::sch export pdf (raw, no extra flags)"
          kicad-cli sch export pdf \
            --output debug-output/schematic.pdf \
            "${KICAD_PROJECT_DIR}/${KICAD_PROJECT}.kicad_sch"
          echo "kicad-cli sch export pdf exit code: $?"
          echo "::endgroup::"
          echo "::group::pcb export svg (raw, sanity check)"
          kicad-cli pcb export svg \
            --layers F.Cu,F.Silkscreen,F.Mask,Edge.Cuts \
            --output debug-output/pcb-top.svg \
            "${KICAD_PROJECT_DIR}/${KICAD_PROJECT}.kicad_pcb"
          echo "kicad-cli pcb export svg exit code: $?"
          echo "::endgroup::"
          echo "::group::debug-output contents"
          ls -la debug-output/ || true
          echo "::endgroup::"

      # ----------------------------------------------------------------------
      # Run KiBot, one output at a time, with per-output failure tolerance.
      # If any single output fails, log it and keep going. The artifact will
      # still contain everything that did succeed.
      # ----------------------------------------------------------------------
      - name: Run KiBot (visual preset, per-output)
        continue-on-error: true
        run: |
          set +e
          mkdir -p output
          OUTPUTS=(
            schematic_pdf
            pcb_top_png
            pcb_bottom_png
            pcb_svg_top
            pcb_svg_bottom
            png_3d_top
            png_3d_bottom
            png_3d_angled
          )
          FAILED=()
          for out in "${OUTPUTS[@]}"; do
            echo "::group::KiBot output: ${out}"
            kibot \
              -c config/kibot-visual.yaml \
              -d output \
              -e "${KICAD_PROJECT_DIR}/${KICAD_PROJECT}.kicad_sch" \
              -b "${KICAD_PROJECT_DIR}/${KICAD_PROJECT}.kicad_pcb" \
              "${out}"
            rc=$?
            if [ $rc -ne 0 ]; then
              FAILED+=("${out} (exit ${rc})")
              echo "::warning title=KiBot output failed::${out} returned ${rc}"
            fi
            echo "::endgroup::"
          done
          echo "::group::Summary"
          echo "Total outputs: ${#OUTPUTS[@]}"
          echo "Failed: ${#FAILED[@]}"
          for f in "${FAILED[@]}"; do echo "  - ${f}"; done
          echo "::endgroup::"
          ls -laR output/ || true

      - name: Upload visual preview artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-preview-${{ github.run_number }}-${{ github.sha }}
          path: |
            output/
            debug-output/
          retention-days: 14
          if-no-files-found: warn
