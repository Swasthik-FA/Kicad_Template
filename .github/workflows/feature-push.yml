# ============================================================================
# Stage 1 — Feature branch push (FAST, no gating)
# ----------------------------------------------------------------------------
# Trigger:  any push to a `feature/**` branch.
# Purpose:  visual previews so the engineer can sanity-check the design
#           without being blocked on ERC/DRC.
# Outputs:  schematic PDF + 3 × 3D PNG renders + interactive HTML BOM
#           (the `visual` group from config/kibot/kibot_main.yaml).
# ============================================================================
name: Feature push — visual preview

on:
  push:
    branches:
      - 'feature/**'

env:
  KICAD_PROJECT_DIR: hardware
  KICAD_PROJECT: Nano-Board-rev-2
  KIBOT_CONFIG: config/kibot/kibot_main.yaml
  KIBOT_LOG: kibot_run.log

jobs:
  visual:
    name: Visual preview (no ERC/DRC)
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/inti-cmnb/kicad_auto:ki9
      options: --user root

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: KiBot — visual group
        id: kibot
        continue-on-error: true
        run: |
          set +e
          mkdir -p output
          kibot \
            -c "${KIBOT_CONFIG}" \
            -d output \
            -e "${KICAD_PROJECT_DIR}/${KICAD_PROJECT}.kicad_sch" \
            -b "${KICAD_PROJECT_DIR}/${KICAD_PROJECT}.kicad_pcb" \
            --skip-pre erc,drc \
            --log "${KIBOT_LOG}" \
            visual

      - name: Show KiBot log + output tree
        if: always()
        run: |
          echo "::group::Last 100 lines of KiBot log"
          [ -f "${KIBOT_LOG}" ] && tail -n 100 "${KIBOT_LOG}" || echo "(no log)"
          echo "::endgroup::"
          echo "::group::output/ tree"
          if [ -d output ]; then find output -maxdepth 4 | sort; else echo "(no output dir)"; fi
          echo "::endgroup::"

      - name: Upload visual preview artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-preview-${{ github.run_number }}-${{ github.sha }}
          path: |
            output/
            ${{ env.KIBOT_LOG }}
          retention-days: 14
          if-no-files-found: warn
