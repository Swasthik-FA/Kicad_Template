# ============================================================================
# Stage 1 — Feature branch push (FAST, no gating)
# ----------------------------------------------------------------------------
# Trigger:  any push to a `feature/**` branch.
# Purpose:  fast schematic + 3D PNG previews so the engineer can sanity-check
#           work without being blocked on ERC/DRC.
#
# Implementation: uses the official INTI-CMNB/KiBot@v2_dk8 GitHub Action,
#                 the same way the reference Fastbit ci.yaml workflow does.
#                 The action provides the KiCad 8 + KiBot environment with
#                 cache3D enabled, which is what makes render_3d reliable.
# ============================================================================
name: Feature push — visual preview

on:
  push:
    branches:
      - 'feature/**'

env:
  KICAD_PROJECT_DIR: hardware
  KICAD_PROJECT: Nano-Board-rev-2
  KIBOT_CONFIG: config/kibot-visual.yaml
  KIBOT_LOG: kibot_run.log

jobs:
  visual-preview:
    name: Visual preview (no ERC/DRC)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Cache 3D models between runs (mirrors the reference workflow). Saves
      # ~30-60 s on subsequent runs and makes render_3d much more reliable.
      - name: Cache 3D models data
        id: models-cache
        uses: actions/cache@v4
        with:
          path: ~/cache_3d
          key: cache_3d-${{ runner.os }}

      # The KiBot action provides the KiCad 8 + KiBot container, mounts the
      # repo, and forwards options to the kibot CLI. Same pattern as the
      # reference's "Generate outputs (KiCad 8)" step.
      - name: Generate visuals (KiBot, KiCad 9)
        id: kibot
        continue-on-error: true
        uses: INTI-CMNB/KiBot@v2_dk9
        with:
          config: ${{ env.KIBOT_CONFIG }}
          schema: ${{ env.KICAD_PROJECT_DIR }}/${{ env.KICAD_PROJECT }}.kicad_sch
          board: ${{ env.KICAD_PROJECT_DIR }}/${{ env.KICAD_PROJECT }}.kicad_pcb
          dir: output
          additional_args: --log ${{ env.KIBOT_LOG }}
          cache3D: YES

      # Always print the KiBot log tail and the output tree so failures are
      # diagnosable from the Actions UI alone (no need to download artifacts).
      - name: Show KiBot log + output tree
        if: always()
        shell: bash
        run: |
          echo "::group::Last 100 lines of KiBot log"
          [ -f "${KIBOT_LOG}" ] && tail -n 100 "${KIBOT_LOG}" || echo "(log file missing)"
          echo "::endgroup::"
          echo "::group::output/ contents"
          if [ -d output ]; then
            find output -maxdepth 4 -printf '%p\n' | sort
          else
            echo "(no output directory)"
          fi
          echo "::endgroup::"

      # Always upload whatever was produced, plus the kibot log for offline
      # debugging. `if-no-files-found: warn` keeps the job green when output
      # is empty so we still get the annotations.
      - name: Upload visual preview artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-preview-${{ github.run_number }}-${{ github.sha }}
          path: |
            output/
            ${{ env.KIBOT_LOG }}
          retention-days: 14
          if-no-files-found: warn
