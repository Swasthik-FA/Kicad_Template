# ============================================================================
# Stage 1 — Feature branch push (RELAXED, never blocks)
# ----------------------------------------------------------------------------
# Trigger:  any push to a `feature/**` branch.
# Purpose:  early-warning ERC/DRC + visual previews so the engineer can see
#           issues immediately. NOTHING here ever fails the workflow —
#           feature branches push freely. Issues only become merge-blockers
#           at Stage 2 (PR → dev).
# Outputs:
#   - error-report.html       (always — green when clean, red with details when not)
#   - schematic PDF, 3 × 3D PNG renders, interactive HTML BOM
# ============================================================================
name: Feature push — visual preview (relaxed ERC/DRC)

on:
  push:
    branches:
      - 'feature/**'

env:
  KICAD_PROJECT_DIR: hardware
  KICAD_PROJECT: Nano-Board-rev-2
  KIBOT_CONFIG: config/kibot/kibot_main.yaml
  KIBOT_LOG: kibot_run.log

permissions:
  contents: write

jobs:
  visual:
    name: Visual preview (no gating)
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/inti-cmnb/kicad_auto:ki9
      options: --user root

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare reports directory
        run: mkdir -p output/reports

      # ----------------------------------------------------------------------
      # ERC + DRC — run for visibility, NEVER fail the workflow on the result.
      # `|| true` forces a zero exit regardless of violations. JSON + RPT
      # reports land in output/reports/ and end up in the artifact.
      # ----------------------------------------------------------------------
      - name: ERC via kicad-cli (informational)
        run: |
          set +e
          SCH="${KICAD_PROJECT_DIR}/${KICAD_PROJECT}.kicad_sch"
          kicad-cli sch erc --format json -o output/reports/erc.json "${SCH}" || true
          kicad-cli sch erc                -o output/reports/erc.rpt  "${SCH}" || true

      - name: DRC via kicad-cli (informational)
        run: |
          set +e
          PCB="${KICAD_PROJECT_DIR}/${KICAD_PROJECT}.kicad_pcb"
          kicad-cli pcb drc --format json --schematic-parity -o output/reports/drc.json "${PCB}" || true
          kicad-cli pcb drc                --schematic-parity -o output/reports/drc.rpt  "${PCB}" || true

      # ----------------------------------------------------------------------
      # Count violations — purely informational. Drives a friendly summary,
      # NOT a merge gate. The job never exits non-zero based on this.
      # ----------------------------------------------------------------------
      - name: Count violations (informational)
        id: count
        continue-on-error: true
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          def tally(p):
              try: j = json.load(open(p))
              except Exception: return 0,0
              e=w=0
              for sh in j.get('sheets',[j]):
                  for v in sh.get('violations',[]) or []:
                      s=(v.get('severity') or '').lower()
                      e += s=='error'; w += s=='warning'
              for s2 in ('unconnected_items','schematic_parity'):
                  for v in j.get(s2,[]) or []:
                      s=(v.get('severity') or '').lower()
                      e += s=='error'; w += s=='warning'
              return e,w
          ee,ew = tally('output/reports/erc.json')
          de,dw = tally('output/reports/drc.json')
          print(f"erc_errors={ee}")
          print(f"erc_warnings={ew}")
          print(f"drc_errors={de}")
          print(f"drc_warnings={dw}")
          PY

      - name: Generate error report HTML (always)
        if: always()
        continue-on-error: true
        run: |
          python3 config/generate_error_report.py \
            --erc-json output/reports/erc.json \
            --drc-json output/reports/drc.json \
            --erc-rpt  output/reports/erc.rpt \
            --drc-rpt  output/reports/drc.rpt \
            --output   output/error-report.html || true

      # ----------------------------------------------------------------------
      # Visual outputs (KiBot — visual group). --skip-pre is harmless here
      # because we already produced the ERC/DRC artifacts ourselves above.
      # `continue-on-error: true` keeps the workflow green even if a render
      # hiccups.
      # ----------------------------------------------------------------------
      - name: KiBot — visual group
        id: kibot
        continue-on-error: true
        run: |
          set +e
          # Run the full group so the navigate_results page's links to
          # gerbers/, assembly/, bom/, drill/, schematic/, ibom/, 3d/, and
          # reports/ all resolve to real files. Stage 1 stays informational
          # and never blocks regardless of ERC/DRC severity.
          kibot \
            -c "${KIBOT_CONFIG}" \
            -d output \
            -e "${KICAD_PROJECT_DIR}/${KICAD_PROJECT}.kicad_sch" \
            -b "${KICAD_PROJECT_DIR}/${KICAD_PROJECT}.kicad_pcb" \
            --log "${KIBOT_LOG}" \
            full

      # ----------------------------------------------------------------------
      # Friendly job-summary block — visible on the run page without
      # downloading anything. Pure information, never blocks.
      # ----------------------------------------------------------------------
      - name: Job summary
        if: always()
        continue-on-error: true
        run: |
          {
            echo "## Feature push — visual preview"
            echo ""
            echo "| Check | Errors | Warnings |"
            echo "|-------|--------|----------|"
            echo "| ERC   | ${{ steps.count.outputs.erc_errors }} | ${{ steps.count.outputs.erc_warnings }} |"
            echo "| DRC   | ${{ steps.count.outputs.drc_errors }} | ${{ steps.count.outputs.drc_warnings }} |"
            echo ""
            echo "ERC/DRC are **informational only** on feature branches. They block merges only at the PR-to-dev stage."
            echo ""
            echo "### Output tree"
            echo '```'
            [ -d output ] && find output -maxdepth 4 | sort || echo "(no output)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # ----------------------------------------------------------------------
      # Publish rendered PNGs and refresh repo-name placeholder in README.
      # The README has marker comments <!--REPO_NAME-->...<!--/REPO_NAME-->;
      # we always rewrite the content between them with the live GitHub repo
      # name so the title tracks renames automatically.
      # Pushes made by GITHUB_TOKEN do not re-trigger workflows, so no loop.
      # ----------------------------------------------------------------------
      - name: Publish renders and refresh README repo name
        if: always()
        continue-on-error: true
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set +e
          # The navigate_results page links to erc-erc.{html,rpt,json} and
          # drc-drc.{html,rpt,json}. Build proper standalone report pages
          # (with download buttons + tabular violations + raw .rpt) and
          # alias the .rpt/.json so the navigate links resolve to real
          # downloadable files.
          mkdir -p output/reports
          for stem in erc drc; do
            for ext in rpt json; do
              src="output/reports/${stem}.${ext}"
              dst="output/reports/${stem}-${stem}.${ext}"
              if [ -f "$src" ]; then
                cp -f "$src" "$dst"
                echo "aliased: $src -> $dst"
              fi
            done
            python3 config/generate_report_page.py \
              --kind "${stem}" \
              --rpt   "output/reports/${stem}.rpt" \
              --json  "output/reports/${stem}.json" \
              --output "output/reports/${stem}-${stem}.html" \
              --project "${KICAD_PROJECT}" \
              || echo "warn: generate_report_page.py failed for ${stem}"
          done

          # Mirror the entire KiBot output tree under HTML/ so the
          # navigate_results webpage's relative links (../3d/, ../reports/,
          # ../schematic/, ../ibom/, …) resolve correctly when browsed
          # from the repo. Wipe HTML/ first to avoid stale files.
          mkdir -p HTML
          find HTML -mindepth 1 ! -name '.gitkeep' -exec rm -rf {} + 2>/dev/null
          if [ -d output ]; then
            cp -rf output/. HTML/
          fi
          [ -f output/error-report.html ] && cp -f output/error-report.html HTML/error-report.html

          # Rewrite the repo-name placeholder in README.md, idempotently.
          if [ -f README.md ]; then
            python3 - <<PY
          import os, re, pathlib
          p = pathlib.Path("README.md")
          s = p.read_text(encoding="utf-8")
          name = os.environ["REPO_NAME"]
          new = re.sub(
              r"<!--REPO_NAME-->.*?<!--/REPO_NAME-->",
              f"<!--REPO_NAME-->{name}<!--/REPO_NAME-->",
              s, flags=re.S,
          )
          if new != s:
              p.write_text(new, encoding="utf-8")
              print(f"README.md: repo name set to {name}")
          else:
              print("README.md: repo name already current")
          PY
          fi

          # Make git happy inside the container
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add HTML README.md
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git commit -m "ci: refresh 3D PCB renders and README repo name [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Upload visual preview artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: visual-preview-${{ github.run_number }}-${{ github.sha }}
          path: |
            output/
            ${{ env.KIBOT_LOG }}
          retention-days: 14
          if-no-files-found: warn

      # ----------------------------------------------------------------------
      # Final step — explicit success. Stage 1 is informational only and
      # must NEVER mark the run red, no matter what happened upstream.
      # ----------------------------------------------------------------------
      - name: Always succeed
        if: always()
        run: |
          echo "Stage 1 (feature push) is informational only — run finishes green regardless of ERC/DRC/render results."
          exit 0
