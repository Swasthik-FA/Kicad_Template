# ============================================================================
# Deploy HTML/ to GitHub Pages
# ----------------------------------------------------------------------------
# Publishes the contents of HTML/ as the static site. Pages serves HTML/
# as the site root, so HTML/HTML/<x>.html lives at /HTML/<x>.html.
#
# REQUIRED one-time setup (manual, by the repo owner):
#   Settings -> Pages -> Build and deployment -> Source: "GitHub Actions"
# ============================================================================
name: Deploy HTML to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'HTML/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload HTML/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: HTML

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
