# ============================================================================
# Deploy HTML/ to GitHub Pages
# ----------------------------------------------------------------------------
# Publishes the contents of HTML/ as a static site whenever the default
# branch (or main) gets new HTML/* files. The site URL is shown in the
# job summary and on Settings → Pages.
#
# Required one-time setup (manual, by the repo owner):
#   Settings → Pages → Build and deployment → Source: "GitHub Actions"
# Once set, this workflow handles the rest. The 3D viewer
# (<model-viewer> + GLB) only works over HTTP/HTTPS, so this is what
# makes it accessible from phones, tablets, and other machines without
# any local server.
# ============================================================================
name: Deploy HTML to GitHub Pages

on:
  push:
    # TODO: drop `feature/test-pipeline` once Pages deployment is verified;
    # leave only main + dev for production.
    branches: [main, dev, feature/test-pipeline]
    paths:
      - 'HTML/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload HTML/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: HTML

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
